# buf code generation configuration.
#
# Generates:
#   - Go structs   → ../gateway-go/pkg/protocol/gen/
#   - TypeScript    → ../src/protocol/generated/
#
# Rust generation is handled separately via prost-build in core-rs/build.rs.
#
# Prerequisites:
#   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
#   npm install -g ts-proto
version: v2
plugins:
  # Go protobuf structs
  - local: protoc-gen-go
    out: ../gateway-go/pkg/protocol/gen
    opt:
      - paths=source_relative

  # TypeScript type definitions (ts-proto)
  - local: protoc-gen-ts_proto
    out: ../src/protocol/generated
    opt:
      - esModuleInterop=true
      - oneof=unions
      - unrecognizedEnum=false
      - snakeToCamel=true
      - outputEncodeMethods=false
      - outputJsonMethods=false
      - outputClientImpl=false
