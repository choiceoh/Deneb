// Gateway protocol frame definitions.
//
// Defines the three frame types exchanged over WebSocket:
//   - RequestFrame: client → server RPC calls
//   - ResponseFrame: server → client RPC responses
//   - EventFrame: server → client async notifications
//
// Protocol version: 3

syntax = "proto3";

package deneb.gateway;

option go_package = "github.com/choiceoh/deneb/gateway-go/pkg/protocol/gen";

import "google/protobuf/struct.proto";

// `ErrorCode` enumerates all known gateway error codes.
// Mirrors src/gateway/protocol/schema/error-codes.ts.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  // Legacy codes (backward compatible)
  ERROR_CODE_NOT_LINKED = 1;
  ERROR_CODE_NOT_PAIRED = 2;
  ERROR_CODE_AGENT_TIMEOUT = 3;    // retryable
  ERROR_CODE_INVALID_REQUEST = 4;
  ERROR_CODE_UNAVAILABLE = 5;      // retryable
  // `INVALID_REQUEST` refinements
  ERROR_CODE_MISSING_PARAM = 10;
  ERROR_CODE_NOT_FOUND = 11;
  ERROR_CODE_UNAUTHORIZED = 12;
  ERROR_CODE_VALIDATION_FAILED = 13;
  ERROR_CODE_CONFLICT = 14;
  ERROR_CODE_FORBIDDEN = 15;
  // UNAVAILABLE refinements
  ERROR_CODE_NODE_DISCONNECTED = 20; // retryable
  ERROR_CODE_DEPENDENCY_FAILED = 21; // retryable
  ERROR_CODE_FEATURE_DISABLED = 22;
}

// `FfiErrorCode` enumerates C ABI return codes for extern "C" functions.
// Values here are positive; generators negate them for Rust/Go output.
// Positive FFI return values from buffer-writing functions are bytes written,
// not error codes.
enum FfiErrorCode {
  FFI_ERROR_CODE_UNSPECIFIED = 0;
  FFI_ERROR_CODE_NULL_POINTER = 1;
  FFI_ERROR_CODE_INVALID_UTF8 = 2;
  FFI_ERROR_CODE_OUTPUT_TOO_SMALL = 3;
  FFI_ERROR_CODE_INPUT_TOO_LARGE = 4;
  FFI_ERROR_CODE_JSON_ERROR = 5;
  FFI_ERROR_CODE_OVERFLOW = 6;
  FFI_ERROR_CODE_VALIDATION = 7;
  FFI_ERROR_CODE_RUST_PANIC = 99;
}

// `ErrorShape` is the structured error payload embedded in `ResponseFrame.error`.
message ErrorShape {
  string code = 1;    // `ErrorCode` string (e.g., `NOT_FOUND`).
  string message = 2; // Human-readable error description.
  // Optional structured details (schema varies by error code).
  // This field is absent when no details are provided. Clients MUST treat it
  // as nullable — never assume it is a non-null object or a specific type
  // without checking the enclosing error code first.
  google.protobuf.Value details = 3;
  optional bool retryable = 4;       // Hint: client may retry the request.
  optional uint64 retry_after_ms = 5; // Suggested retry delay in milliseconds.
  optional string cause = 6;         // Underlying cause for debugging.
}

// `RequestFrame` — client-to-server RPC request.
// TypeScript: { type: "req", id: string, method: string, params?: unknown }
message RequestFrame {
  string id = 1;
  string method = 2;
  google.protobuf.Struct params = 3;
}

// `ResponseFrame` — server-to-client RPC response.
// TypeScript: { type: "res", id: string, ok: bool, payload?: unknown, error?: `ErrorShape` }
message ResponseFrame {
  string id = 1;
  bool ok = 2;
  google.protobuf.Value payload = 3;
  ErrorShape error = 4;
}

// `StateVersion` tracks monotonic version counters for client-side cache invalidation.
// Clients compare these against their local state to decide when to re-fetch.
message StateVersion {
  uint64 presence = 1; // Incremented on any presence change (connect/disconnect/update).
  uint64 health = 2;   // Incremented on channel health state changes.
}

// `EventFrame` — server-to-client async event.
// TypeScript: { type: "event", event: string, payload?: unknown, seq?: number, stateVersion?: `StateVersion` }
message EventFrame {
  string event = 1;
  google.protobuf.Value payload = 2;
  optional uint64 seq = 3;
  StateVersion state_version = 4;
}

// `GatewayFrame` is a union of all frame types, discriminated by the type field.
// On the wire (JSON), the "type" field is "req", "res", or "event".
message GatewayFrame {
  oneof frame {
    RequestFrame request = 1;
    ResponseFrame response = 2;
    EventFrame event = 3;
  }
}

// `PresenceEntry` represents a connected device/client.
message PresenceEntry {
  optional string host = 1;
  optional string ip = 2;
  optional string version = 3;
  optional string platform = 4;
  optional string device_family = 5;
  optional string model_identifier = 6;
  optional string mode = 7;
  optional uint64 last_input_seconds = 8;
  optional string reason = 9;
  repeated string tags = 10;
  optional string text = 11;
  uint64 ts = 12;
  optional string device_id = 13;
  repeated string roles = 14;
  repeated string scopes = 15;
  optional string instance_id = 16;
}

// `HelloOk` — initial connection handshake response.
message HelloOk {
  uint32 protocol = 1;

  message ServerInfo {
    string version = 1;
    string conn_id = 2;
  }
  ServerInfo server = 2;

  message Features {
    repeated string methods = 1;
    repeated string events = 2;
  }
  Features features = 3;

  message Policy {
    uint64 max_payload = 1;
    uint64 max_buffered_bytes = 2;
    uint64 tick_interval_ms = 3;
  }
  Policy policy = 4;

  message AuthInfo {
    string device_token = 1;
    string role = 2;
    repeated string scopes = 3;
    optional uint64 issued_at_ms = 4;
  }
  optional AuthInfo auth = 5;

  // Deprecated: Control UI removed in Phase 0 (Rust+Go migration).
  optional string canvas_host_url = 6 [deprecated = true];
}
