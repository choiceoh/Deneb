// Plugin lifecycle type definitions.
//
// Defines plugin metadata, health status, and lifecycle tracking
// for channel, provider, and feature plugins.

syntax = "proto3";

package deneb.plugin;

option go_package = "github.com/choiceoh/deneb/gateway-go/pkg/protocol/gen";

// PluginKind identifies the type of a plugin.
enum PluginKind {
  PLUGIN_KIND_UNSPECIFIED = 0;
  PLUGIN_KIND_PROVIDER = 2;
  PLUGIN_KIND_FEATURE = 3;
}

// PluginMeta describes a registered plugin.
message PluginMeta {
  string id = 1;
  string name = 2;
  PluginKind kind = 3;
  string version = 4;
  bool enabled = 5;
  optional string description = 6;
  optional string source = 7;
}

// PluginHealthStatus represents the health of a single plugin.
message PluginHealthStatus {
  string plugin_id = 1;
  bool healthy = 2;
  optional string error = 3;
  optional int64 last_check_at = 4;
  optional int64 uptime_ms = 5;
}

// PluginRegistrySnapshot is a point-in-time view of all registered plugins.
message PluginRegistrySnapshot {
  repeated PluginMeta plugins = 1;
  repeated PluginHealthStatus health = 2;
  int64 snapshot_at = 3;
}
