// Session model definitions.
//
// These mirror the TypeScript definitions in src/gateway/session/session-utils.types.ts.

syntax = "proto3";

package deneb.session;

option go_package = "github.com/choiceoh/deneb/gateway-go/pkg/protocol";

// SessionRunStatus matches the TypeScript union type.
enum SessionRunStatus {
  SESSION_RUN_STATUS_UNSPECIFIED = 0;
  SESSION_RUN_STATUS_RUNNING = 1;
  SESSION_RUN_STATUS_DONE = 2;
  SESSION_RUN_STATUS_FAILED = 3;
  SESSION_RUN_STATUS_KILLED = 4;
  SESSION_RUN_STATUS_TIMEOUT = 5;
}

// SessionKind matches the TypeScript "direct" | "group" | "global" | "unknown".
enum SessionKind {
  SESSION_KIND_UNSPECIFIED = 0;
  SESSION_KIND_DIRECT = 1;
  SESSION_KIND_GROUP = 2;
  SESSION_KIND_GLOBAL = 3;
  SESSION_KIND_UNKNOWN = 4;
}

// GatewaySessionRow — full session state.
// TypeScript: GatewaySessionRow in session-utils.types.ts
message GatewaySessionRow {
  string key = 1;
  SessionKind kind = 2;

  optional string spawned_by = 3;
  optional string label = 4;
  optional string display_name = 5;
  optional string derived_title = 6;
  optional string last_message_preview = 7;
  optional string channel = 8;
  optional string subject = 9;
  optional string group_channel = 10;
  optional string space = 11;
  optional string chat_type = 12;
  optional string origin = 13;

  optional int64 updated_at = 14;
  optional string session_id = 15;

  optional bool system_sent = 16;
  optional bool aborted_last_run = 17;

  // Model/inference settings
  optional string thinking_level = 18;
  optional bool fast_mode = 19;
  optional string verbose_level = 20;
  optional string reasoning_level = 21;
  optional string elevated_level = 22;
  optional string send_policy = 23; // "allow" | "deny"

  // Token usage
  optional uint64 input_tokens = 24;
  optional uint64 output_tokens = 25;
  optional uint64 total_tokens = 26;
  optional bool total_tokens_fresh = 27;
  optional double estimated_cost_usd = 28;

  // Run state
  SessionRunStatus status = 29;
  optional int64 started_at = 30;
  optional int64 ended_at = 31;
  optional uint64 runtime_ms = 32;

  // Hierarchy
  optional string parent_session_key = 33;
  repeated string child_sessions = 34;

  // Model info
  optional string response_usage = 35; // "on" | "off" | "tokens" | "full"
  optional string model_provider = 36;
  optional string model = 37;
  optional uint64 context_tokens = 38;

  // Delivery
  optional string last_channel = 39;
  optional string last_to = 40;
  optional string last_account_id = 41;
}

// SessionPreviewItem — a single item in a session preview.
message SessionPreviewItem {
  string role = 1; // "user" | "assistant" | "tool" | "system" | "other"
  string text = 2;
}

// SessionsPreviewEntry — preview of a session.
message SessionsPreviewEntry {
  string key = 1;
  string status = 2; // "ok" | "empty" | "missing" | "error"
  repeated SessionPreviewItem items = 3;
}
