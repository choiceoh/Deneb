// Provider catalog type definitions.
//
// Defines LLM/model provider metadata, auth methods, and catalog entries
// for the provider plugin system.

syntax = "proto3";

package deneb.provider;

option go_package = "github.com/choiceoh/deneb/gateway-go/pkg/protocol/gen";

// ProviderMeta describes a registered model provider.
message ProviderMeta {
  string id = 1;
  string label = 2;
  optional string docs_path = 3;
  repeated string aliases = 4;
  repeated string env_vars = 5;
}

// ProviderAuthMethod describes one authentication method for a provider.
message ProviderAuthMethod {
  string id = 1;
  string label = 2;
  // Auth kind: "oauth", "api_key", "token", "device_code", "custom".
  string kind = 3;
  optional string hint = 4;
}

// ProviderCatalogEntry represents a single model in the provider catalog.
message ProviderCatalogEntry {
  string provider = 1;
  string model_id = 2;
  optional string label = 3;
  optional int64 context_window = 4;
  optional bool reasoning = 5;
  optional string api_type = 6;
}

// ProviderCatalogSnapshot is a point-in-time view of all discovered models.
message ProviderCatalogSnapshot {
  repeated ProviderMeta providers = 1;
  repeated ProviderCatalogEntry entries = 2;
  int64 snapshot_at = 3;
}
