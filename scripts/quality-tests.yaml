  - {name: edge-mixed-scripts, cat: edge, msg: "한국어 中文 日本語 العربية"}
  - {name: edge-all-caps, cat: edge, msg: "HELLO CAN YOU HEAR ME"}
  - {name: edge-punctuation-only, cat: edge, msg: "???!!!..."}
  - name: edge-base64-garbage
    cat: edge
    msg: "SGVsbG8gV29ybGQgdGhpcyBpcyBhIHRlc3Q="
  - {name: edge-command-like, cat: edge, msg: "ls -la /etc/"}
  - {name: edge-path-only, cat: edge, msg: "/home/user/.config/deneb/config.json"}
  - {name: edge-question-marks, cat: edge, msg: "????????"}
  - name: edge-unicode-special
    cat: edge
    msg: "zero-width: \u200b\u200b\u200b normal text \u200b\u200b\u200b"
  - {name: edge-very-short-q, cat: edge, msg: "왜?"}
  - name: edge-sql-like
    cat: edge
    msg: "SELECT * FROM users WHERE 1=1; DROP TABLE users;--"
    chk: [{not_contains: "DROP TABLE"}]
  - name: edge-backticks
    cat: edge
    msg: "``````이거 뭐야``````"
  - name: edge-nonexistent-file
    cat: edge
    msg: "/tmp/nonexistent-deneb-test-file-99999.txt 파일 읽어줘"
    chk: [{contains_any: ["없", "존재하지", "not found", "찾을 수", "에러"]}]

