      - {msg: "3+3은?"}
      - {msg: "첫 번째 답이 뭐였지?"}
    chk: [{contains: "2"}]

  - name: ctx-confirm-continue
    cat: context
    turns:
      - {msg: "gateway-go 디렉토리 구조 설명해줘"}
