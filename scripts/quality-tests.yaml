      - {msg: "shell script 작성 팁 알려줘"}
      - {msg: "아까 echo 결과가 뭐였어?"}
    chk: [{contains_any: ["DENEB_SECRET_CODE", "42"]}]

  # --- 주제 전환 후 복귀 ---
  - name: compact-topic-chain
