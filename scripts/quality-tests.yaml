  # ============================================================
  # CONTEXT — 멀티턴 대화 (25)
  # ============================================================
  - name: ctx-name-recall
    cat: context
    turns:
      - {msg: "내 이름은 홍길동이야"}
      - {msg: "내 이름이 뭐야?"}
    chk: [{contains: "홍길동"}]

  - name: ctx-number-recall
    cat: context
    turns:
      - {msg: "내가 좋아하는 숫자는 42야"}
      - {msg: "내가 좋아하는 숫자가 뭐라고 했지?"}
    chk: [{contains: "42"}]

  - name: ctx-topic-continuity
    cat: context
    turns:
      - {msg: "Go 언어에 대해 얘기하자"}
      - {msg: "그 언어의 장점은?"}
    chk: [{contains_any: ["Go", "고", "동시성", "간결", "goroutine"]}]

  - name: ctx-correction
    cat: context
    turns:
      - {msg: "내가 좋아하는 색은 파란색이야"}
      - {msg: "아니다, 빨간색이야"}
      - {msg: "내가 좋아하는 색이 뭐야?"}
    chk: [{contains_any: ["빨간", "빨강", "red"]}]

  - name: ctx-implicit-ref
    cat: context
    turns:
      - {msg: "gateway-go/cmd/gateway/main.go 읽어줘"}
      - {msg: "거기서 import 부분만 다시 보여줘"}
    chk: [has_reply]

  - name: ctx-build-on-prev
    cat: context
    turns:
      - {msg: "변수라는 게 뭐야?"}
      - {msg: "예시 코드로 보여줘"}
    chk: [has_code_block]

  - name: ctx-summarize-prev
    cat: context
    turns:
      - {msg: "Go 언어의 특징을 5가지 알려줘"}
      - {msg: "방금 말한 거 한 줄로 요약해줘"}
    chk: [has_reply]

  - name: ctx-language-keep
    cat: context
    turns:
      - {msg: "한국어로 대답해줘"}
      - {msg: "What is Go?"}
    chk: [korean]

  - name: ctx-task-chain
    cat: context
    turns:
      - {msg: "Makefile 읽어줘"}
      - {msg: "거기서 rust 관련 타겟 뭐가 있어?"}
    chk: [{contains_any: ["rust", "cargo", "core-rs"]}]

  - name: ctx-mood-empathy
    cat: context
    turns:
      - {msg: "오늘 힘든 하루였어"}
      - {msg: "위로 한마디 해줘"}
    chk: [korean]

  - name: ctx-preference
    cat: context
    turns:
      - {msg: "나는 간결한 답변을 좋아해"}
      - {msg: "Docker가 뭐야?"}
    chk: [has_reply]

  - name: ctx-multi-question
    cat: context
    turns:
      - {msg: "Go가 뭐야?"}
      - {msg: "Rust는?"}
      - {msg: "둘 중 뭐가 더 빨라?"}
    chk: [{contains_any: ["Go", "Rust", "빠", "성능"]}]

  - name: ctx-file-then-explain
    cat: context
    turns:
      - {msg: "/etc/hostname 읽어줘"}
      - {msg: "그게 뭐하는 파일이야?"}
    chk: [{contains_any: ["호스트", "hostname", "이름", "네트워크"]}]

  - name: ctx-error-then-retry
    cat: context
    turns:
      - {msg: "/tmp/nonexistent-file-xyz.txt 읽어줘"}
      - {msg: "그럼 /etc/hostname 읽어줘"}
    chk: [has_reply]

  - name: ctx-count-then-detail
    cat: context
    turns:
      - {msg: "Go 파일 몇 개 있어?"}
      - {msg: "가장 큰 파일은 뭐야?"}
    chk: [has_reply]

  - name: ctx-define-then-use
    cat: context
    turns:
      - {msg: "앞으로 X라고 하면 gateway-go 디렉토리를 의미하는 거야"}
      - {msg: "X의 구조 설명해줘"}
    chk: [{contains_any: ["gateway", "Go", "서버", "internal"]}]

  - name: ctx-joke-then-serious
    cat: context
    turns:
      - {msg: "재밌는 얘기 해줘"}
      - {msg: "이제 진지하게, 시스템 상태 확인해줘"}
    chk: [has_reply]

  - name: ctx-long-conversation
    cat: context
    turns:
      - {msg: "안녕"}
      - {msg: "시스템 상태 좀 봐줘"}
      - {msg: "고마워"}
      - {msg: "다른 거 하나만 더. Makefile 타겟 뭐 있어?"}
    chk: [has_reply]

  - name: ctx-switch-topic
    cat: context
    turns:
      - {msg: "Go 언어 특징 알려줘"}
      - {msg: "아 그리고 디스크 공간 얼마나 남았어?"}
    chk: [has_reply]

  - name: ctx-refer-earlier
    cat: context
    turns:
      - {msg: "1+1은?"}
      - {msg: "3+3은?"}
      - {msg: "첫 번째 답이 뭐였지?"}
    chk: [{contains: "2"}]

  - name: ctx-confirm-continue
    cat: context
    turns:
      - {msg: "gateway-go 디렉토리 구조 설명해줘"}
      - {msg: "ㅇㅇ 그리고 internal 안에는?"}
    chk: [{contains_any: ["internal", "server", "rpc", "session", "chat"]}]

  - name: ctx-deny-correct
    cat: context
    turns:
      - {msg: "이 프로젝트는 Java로 만들었지?"}
      - {msg: "아니야 Go랑 Rust야. 맞지?"}
    chk: [{contains_any: ["Go", "Rust", "맞"]}]

  - name: ctx-session-state
    cat: context
    turns:
      - {msg: "echo test123 실행해줘"}
      - {msg: "방금 실행한 결과가 뭐였지?"}
    chk: [{contains: "test123"}]

  - name: ctx-instruction-persist
    cat: context
    turns:
      - {msg: "앞으로 답변은 3줄 이내로 해줘"}
      - {msg: "Go 언어가 뭐야?"}
    chk: [has_reply]

  - name: ctx-math-sequence
    cat: context
    turns:
      - {msg: "5 곱하기 3은?"}
      - {msg: "거기에 7 더하면?"}
    chk: [{contains: "22"}]

