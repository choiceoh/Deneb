  - {name: daily-weather,        cat: daily, msg: "오늘 날씨 어때?"}
  - {name: daily-time,           cat: daily, msg: "지금 몇 시야?"}
  - {name: daily-joke,           cat: daily, msg: "재밌는 얘기 해줘"}
  - {name: daily-compliment,     cat: daily, msg: "잘한다~"}
