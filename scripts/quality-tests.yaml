      - {msg: "시스템 상태 좀 봐줘"}
      - {msg: "고마워"}
      - {msg: "다른 거 하나만 더. Makefile 타겟 뭐 있어?"}
    chk: [has_reply]

  - name: ctx-switch-topic
    cat: context
    turns:
      - {msg: "Go 언어 특징 알려줘"}
      - {msg: "아 그리고 디스크 공간 얼마나 남았어?"}
    chk: [has_reply]

  - name: ctx-refer-earlier
    cat: context
    turns:
