  # ============================================================
  # REASONING — 추론/논리 (20)
  # ============================================================
  - name: reason-arithmetic
    cat: reasoning
    msg: "123 + 456은?"
    chk: [{contains: "579"}]
  - name: reason-multiply
    cat: reasoning
    msg: "17 × 23은?"
    chk: [{contains: "391"}]
  - name: reason-word-problem
    cat: reasoning
    msg: "사과 5개에서 3개 먹으면 몇 개 남아?"
    chk: [{contains: "2"}]
  - name: reason-comparison
    cat: reasoning
    msg: "1024MB는 1GB보다 커? 같아? 작아?"
    chk: [{contains_any: ["같", "1GB", "1024"]}]
  - name: reason-ordering
    cat: reasoning
    msg: "3, 1, 4, 1, 5를 오름차순으로 정렬해줘"
    chk: [{contains: "1, 1, 3, 4, 5"}]
  - name: reason-counting
    cat: reasoning
    msg: "'hello world'에서 l은 몇 개야?"
    chk: [{contains: "3"}]
  - name: reason-pattern
    cat: reasoning
    msg: "2, 4, 8, 16, 다음은?"
    chk: [{contains: "32"}]
  - name: reason-analogy
    cat: reasoning
    msg: "Go:고루틴 = Rust:?"
    chk: [{contains_any: ["async", "tokio", "future", "스레드"]}]
  - name: reason-conditional
    cat: reasoning
    msg: "만약 x=5이고 y=x+3이면, y는?"
    chk: [{contains: "8"}]
  - name: reason-negation
    cat: reasoning
    msg: "TCP는 연결지향이야, 비연결지향이야?"
    chk: [{contains_any: ["연결", "connection"]}]
  - name: reason-estimation
    cat: reasoning
    msg: "Go 소스 파일 1000개면 대략 몇 줄 정도 될까?"
    chk: [has_number]
  - name: reason-unit-convert
    cat: reasoning
    msg: "1TB는 몇 GB야?"
    chk: [{contains: "1024"}]
  - name: reason-time-calc
    cat: reasoning
    msg: "오전 9시부터 오후 5시 30분까지 몇 시간이야?"
    chk: [{contains_any: ["8시간 30분", "8.5"]}]
  - name: reason-logic
    cat: reasoning
    msg: "모든 개는 동물이다. 모든 동물은 생물이다. 개는 생물인가?"
    chk: [{contains_any: ["네", "예", "맞", "생물"]}]
  - name: reason-percentage
    cat: reasoning
    msg: "200의 15%는?"
    chk: [{contains: "30"}]
  - name: reason-binary
    cat: reasoning
    msg: "10진수 255를 2진수로 바꿔줘"
    chk: [{contains: "11111111"}]
  - name: reason-hex
    cat: reasoning
    msg: "16진수 FF는 10진수로 뭐야?"
    chk: [{contains: "255"}]
  - name: reason-fibonacci
    cat: reasoning
    msg: "피보나치 수열 처음 10개 알려줘"
    chk: [{contains_any: ["1, 1, 2, 3, 5", "0, 1, 1, 2, 3"]}]
  - name: reason-prime
    cat: reasoning
    msg: "17은 소수야?"
    chk: [{contains_any: ["소수", "prime", "맞", "네"]}]
  - name: reason-distance
    cat: reasoning
    msg: "시속 60km로 2시간 30분 가면 몇 km?"
    chk: [{contains: "150"}]
