    chk: [has_reply, korean]
  - name: edge-self-referential
    cat: edge
    msg: "이 메시지는 정확히 몇 바이트야? UTF-8 기준으로 계산해줘."
    chk: [has_reply, has_number]
  - name: edge-answer-poem
    cat: edge
    msg: "시스템 상태를 4줄 시 형식으로 알려줘. 운율 맞춰."
    chk: [has_reply, korean, {min_length: 50}]
  - name: edge-csv-with-tools
    cat: edge
    msg: "top -bn1 | head -15 실행하고 결과를 CSV 형식으로 변환해줘"
    chk: [has_reply, used_tools]
  - name: edge-multi-format
    cat: edge
