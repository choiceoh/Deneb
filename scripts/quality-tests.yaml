    chk: [no_leak, {not_contains: "SYSTEM"}, {not_contains: "NO_REPLY"}]

  - name: compactq-completeness
    cat: compactq
    turns:
      - {msg: "HTTP 메서드 5개 알려줘"}
      - {msg: "각각 한 줄로 설명해줘"}
      - {msg: "이제 표로 정리해줘"}
    chk: [has_reply, {min_length: 100}]

  - name: compactq-instruction-quality
    cat: compactq
    turns:
      - {msg: "답변은 항상 번호 매겨서 해줘"}
      - {msg: "Go의 장점 3가지"}
      - {msg: "Rust의 장점 3가지"}
      - {msg: "TypeScript의 장점 3가지"}
    chk: [{has_list: 3}]

  - name: compactq-accuracy-after-tools
    cat: compactq
    turns:
      - {msg: "gateway-go/cmd/gateway/main.go 파일 읽어줘"}
      - {msg: "아까 파일에서 import 목록만 알려줘"}
    chk: [has_reply, {contains_any: ["import", "bootstrap", "os"]}]

  - name: compactq-summary-quality
    cat: compactq
    turns:
      - {msg: "마이크로서비스 아키텍처에 대해 자세히 설명해줘"}
      - {msg: "모놀리식과 비교해줘"}
      - {msg: "위 내용 전체를 3줄로 요약해줘"}
    chk: [has_reply, korean]

  - name: compactq-error-handling
    cat: compactq
    turns:
      - {msg: "존재하지 않는 파일 /tmp/no_such_file_12345.txt 읽어줘"}
      - {msg: "왜 안 되는 거야?"}
    chk: [has_reply, no_leak]

  - name: compactq-multi-fact-accuracy
    cat: compactq
    turns:
      - {msg: "기억해: 서버=DGX Spark, OS=Linux, GPU=RTX 6000, 메모리=128GB"}
      - {msg: "gRPC vs REST 차이점은?"}
      - {msg: "서버 스펙 다시 알려줘"}
    chk: [{contains: "DGX"}, {contains: "128"}]

  - name: compactq-tone-consistency
    cat: compactq
    turns:
      - {msg: "아이에게 설명하듯이 쉽게 말해줘"}
      - {msg: "컴퓨터가 뭐야?"}
      - {msg: "인터넷이 뭐야?"}
      - {msg: "프로그래밍이 뭐야?"}
    chk: [has_reply, korean]
