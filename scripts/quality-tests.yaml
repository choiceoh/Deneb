  # --- 참조 체인 ---
  - name: compact-reference-chain
    cat: compact
    turns:
      - {msg: "A 서비스는 B를 호출하고, B는 C를 호출해. 기억해."}
      - {msg: "Redis 클러스터링 설명해줘"}
      - {msg: "Kafka 파티셔닝 설명해줘"}
      - {msg: "A 서비스에서 시작하면 최종적으로 어디까지 가?"}
    chk: [{contains: "C"}]

  - name: compact-negation-recall
    cat: compact
    turns:
      - {msg: "이 프로젝트는 Python으로 만들었어?"}
      - {msg: "아니, Go랑 Rust로 만들었어"}
      - {msg: "인메모리 DB의 장단점은?"}
      - {msg: "B-Tree 인덱스가 뭐야?"}
      - {msg: "이 프로젝트 뭘로 만들었다고 했지?"}
    chk: [{contains_any: ["Go", "Rust"]}]

  # --- 세션 상태 ---
  - name: compact-session-context
    cat: compact
    turns:
      - {msg: "디스크 용량 확인해줘"}
      - {msg: "위에서 확인한 결과 요약해줘"}
