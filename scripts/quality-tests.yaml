    chk: [{contains_any: ["goroutine", "고루틴"]}]

  - name: compact-topic-switch-deep
    cat: compact
    turns:
      - {msg: "이 프로젝트의 Rust 코어가 뭘 하는지 설명해줘"}
      - {msg: "오늘 점심 뭐 먹을까?"}
