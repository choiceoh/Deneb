  # ============================================================
  # REASONING — 추론/논리 (20)
  # ============================================================
  - name: reason-arithmetic
    cat: reasoning
    msg: "123 + 456은?"
    chk: [{contains: "579"}]
  - name: reason-multiply
    cat: reasoning
    msg: "17 × 23은?"
    chk: [{contains: "391"}]
  - name: reason-word-problem
    cat: reasoning
    msg: "사과 5개에서 3개 먹으면 몇 개 남아?"
    chk: [{contains: "2"}]
  - name: reason-comparison
    cat: reasoning
    msg: "1024MB는 1GB보다 커? 같아? 작아?"
    chk: [{contains_any: ["같", "1GB", "1024"]}]
  - name: reason-ordering
    cat: reasoning
    msg: "3, 1, 4, 1, 5를 오름차순으로 정렬해줘"
    chk: [{contains: "1, 1, 3, 4, 5"}]
  - name: reason-counting
    cat: reasoning
    msg: "'hello world'에서 l은 몇 개야?"
    chk: [{contains: "3"}]
  - name: reason-pattern
    cat: reasoning
    msg: "2, 4, 8, 16, 다음은?"
    chk: [{contains: "32"}]
  - name: reason-analogy
    cat: reasoning
    msg: "Go:고루틴 = Rust:?"
    chk: [{contains_any: ["async", "tokio", "future", "스레드"]}]
  - name: reason-conditional
    cat: reasoning
    msg: "만약 x=5이고 y=x+3이면, y는?"
    chk: [{contains: "8"}]
  - name: reason-negation
    cat: reasoning
    msg: "TCP는 연결지향이야, 비연결지향이야?"
    chk: [{contains_any: ["연결", "connection"]}]
  - name: reason-estimation
    cat: reasoning
    msg: "Go 소스 파일 1000개면 대략 몇 줄 정도 될까?"
    chk: [has_number]
  - name: reason-unit-convert
    cat: reasoning
    msg: "1TB는 몇 GB야?"
    chk: [{contains: "1024"}]
  - name: reason-time-calc
    cat: reasoning
    msg: "오전 9시부터 오후 5시 30분까지 몇 시간이야?"
    chk: [{contains_any: ["8시간 30분", "8.5"]}]
  - name: reason-logic
    cat: reasoning
    msg: "모든 개는 동물이다. 모든 동물은 생물이다. 개는 생물인가?"
    chk: [{contains_any: ["네", "예", "맞", "생물"]}]
  - name: reason-percentage
    cat: reasoning
    msg: "200의 15%는?"
    chk: [{contains: "30"}]
  - name: reason-binary
    cat: reasoning
    msg: "10진수 255를 2진수로 바꿔줘"
    chk: [{contains: "11111111"}]
  - name: reason-hex
    cat: reasoning
    msg: "16진수 FF는 10진수로 뭐야?"
    chk: [{contains: "255"}]
  - name: reason-fibonacci
    cat: reasoning
    msg: "피보나치 수열 처음 10개 알려줘"
    chk: [{contains_any: ["1, 1, 2, 3, 5", "0, 1, 1, 2, 3"]}]
  - name: reason-prime
    cat: reasoning
    msg: "17은 소수야?"
    chk: [{contains_any: ["소수", "prime", "맞", "네"]}]
  - name: reason-distance
    cat: reasoning
    msg: "시속 60km로 2시간 30분 가면 몇 km?"
    chk: [{contains: "150"}]

  # ============================================================
  # COMPACT — 컴팩션 동작 테스트 (20)
  # 멀티턴에서 컨텍스트 누적 시 정보 유지 + 토큰 증가 제어 검증.
  # token_bounded: 마지막 턴 입력 토큰이 첫 턴 대비 N배 이내인지
  # max_input_tokens: 절대 입력 토큰 상한
  # ============================================================

  # --- 기본 리콜 + 토큰 바운드 (5턴+) ---
  - name: compact-name-5turn
    cat: compact
    turns:
      - {msg: "내 이름은 김철수야. 기억해줘."}
      - {msg: "오늘 뭐 먹을까?"}
      - {msg: "Go 언어 특징 알려줘"}
      - {msg: "HTTP 상태 코드 200은 뭐야?"}
      - {msg: "내 이름이 뭐라고 했지?"}
    chk: [{contains: "철수"}]

  - name: compact-number-5turn
    cat: compact
    turns:
      - {msg: "내가 좋아하는 숫자는 7777이야"}
      - {msg: "Rust의 소유권 시스템 설명해줘"}
      - {msg: "도커가 뭐야?"}
      - {msg: "CI/CD 파이프라인이 뭐야?"}
      - {msg: "아까 내가 좋아하는 숫자가 뭐라고 했어?"}
    chk: [{contains: "7777"}]

  - name: compact-fact-7turn
    cat: compact
    turns:
      - {msg: "나는 서울에서 백엔드 개발자로 일하고 있어"}
      - {msg: "gRPC가 뭐야?"}
      - {msg: "마이크로서비스 아키텍처 장단점은?"}
      - {msg: "쿠버네티스 기본 개념 알려줘"}
      - {msg: "Go와 Java 차이점은?"}
      - {msg: "REST API 설계 원칙 알려줘"}
      - {msg: "내가 뭘 하고 있다고 했지? 어디서?"}
    chk: [{contains_any: ["서울", "백엔드"]}]

  - name: compact-multiple-facts
    cat: compact
    turns:
      - {msg: "기억해줘: 이름=박지훈, 나이=32, 직업=데이터엔지니어"}
      - {msg: "TCP와 UDP 차이점 설명해줘"}
      - {msg: "SQL 인덱스가 뭐야?"}
      - {msg: "Redis 캐싱 전략 알려줘"}
      - {msg: "아까 내 정보 3가지 다 말해줘"}
    chk: [{contains: "박지훈"}, {contains: "32"}, {contains_any: ["데이터", "엔지니어"]}]

  - name: compact-correction-survive
    cat: compact
    turns:
      - {msg: "내 취미는 수영이야"}
      - {msg: "아니다, 취미는 등산이야. 수정해줘."}
      - {msg: "프로세스와 스레드 차이점은?"}
      - {msg: "트랜잭션 ACID 속성 설명해줘"}
      - {msg: "캐시 무효화 전략은?"}
      - {msg: "내 취미가 뭐야?"}
    chk: [{contains: "등산"}, {not_contains: "수영"}]

  # --- 도구 사용 후 리콜 ---
  - name: compact-tool-then-recall
    cat: compact
    turns:
      - {msg: "지금 시스템 메모리 사용량 확인해줘"}
