    chk: [{contains: "사과"}, {contains: "우유"}, {contains: "빵"}, {contains: "계란"}]

  - name: compact-count-tracking
    cat: compact
    turns:
      - {msg: "카운터를 0에서 시작해. 기억해."}
      - {msg: "카운터 +3"}
      - {msg: "카운터 +5"}
      - {msg: "카운터 -2"}
      - {msg: "지금 카운터 값은?"}
    chk: [{contains: "6"}]

  # --- 긴 대화 (8~10턴) ---
  - name: compact-8turn-interleave
    cat: compact
    turns:
      - {msg: "사실1: 내 고양이 이름은 나비야"}
      - {msg: "Protobuf가 뭐야?"}
      - {msg: "사실2: 내 차는 현대 아반떼야"}
      - {msg: "WebSocket이 뭐야?"}
      - {msg: "사실3: 내 생일은 3월 15일이야"}
      - {msg: "OAuth가 뭐야?"}
      - {msg: "사실4: 좋아하는 음식은 피자야"}
      - {msg: "아까 말한 사실 4개 다 정리해줘"}
    chk: [{contains: "나비"}, {contains: "아반떼"}, {contains_any: ["3월", "15"]}, {contains: "피자"}, {token_bounded: 2.5}]

  - name: compact-10turn-stress
    cat: compact
    turns:
      - {msg: "비밀 코드: DENEB-2024-ALPHA. 절대 잊지 마."}
      - {msg: "시스템 상태 확인해줘"}
      - {msg: "Go의 인터페이스 설명해줘"}
