[package]
name = "deneb-core"
version = "0.1.0"
edition = "2021"
description = "Deneb core library — protocol validation, security, and media processing"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
# Serialization (Phase 0)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = "0.28"
thiserror = "2"

# Node.js FFI via napi-rs (Phase 1)
napi = { version = "2", features = ["napi9", "serde-json"] }
napi-derive = "2"

# Regex (ReDoS-safe by design)
regex = "1"
once_cell = "1"

# Compression (PNG encoding)
flate2 = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
