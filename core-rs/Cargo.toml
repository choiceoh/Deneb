[package]
name = "deneb-core"
version = "0.1.0"
edition = "2021"
description = "Deneb core library — protocol validation, security, and media processing"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = "0.28"
thiserror = "2"


[profile.release]
lto = true
codegen-units = 1
strip = true
