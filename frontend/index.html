<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Deneb</title>
    <!--
      Telegram injects its WebApp SDK at this URL when the page is opened
      inside the Telegram client. When opened in a regular browser the script
      will fail to load — main.ts handles that case by rendering an error
      banner instead of trying to authenticate.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <!--
      The top-level routes (home, more, settings) live in a horizontal
      Zune-style panorama strip pinned to the top of the page. We place
      it before #app in source order so that on tab routes it sits above
      the content; on drill-down routes main.ts hides it entirely and
      the page reclaims the full viewport.
    -->
    <nav id="tab-bar" aria-label="primary"></nav>
    <div id="app">
      <noscript>JavaScript is required to use the Deneb Mini App.</noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
