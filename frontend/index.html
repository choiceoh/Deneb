<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Deneb</title>
    <!--
      Telegram injects its WebApp SDK at this URL when the page is opened
      inside the Telegram client. When opened in a regular browser the script
      will fail to load — main.ts handles that case by rendering an error
      banner instead of trying to authenticate.

      `defer` lets the HTML parser keep going while this script fetches over
      the network (Telegram CDN can be 100-300ms RTT from outside Korea).
      Deferred scripts execute in source order *after* parsing, so this
      still runs before our `<script type="module">` below — which is the
      only constraint main.ts depends on (it reads `window.Telegram?.WebApp`
      on boot).
    -->
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <!--
      Belt-and-suspenders guard: if an older cached JS bundle still
      references the Vite modulePreload placeholder as a free identifier,
      define it here so the ReferenceError never fires. An empty array
      means "no deps to preload" — the dynamic import still works, just
      without the parallel prefetch optimisation that we disabled anyway.
    -->
    <script>window.__VITE_PRELOAD__=[]</script>
  </head>
  <body>
    <div id="app">
      <noscript>JavaScript is required to use the Deneb Mini App.</noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
