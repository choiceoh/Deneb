# ssrf_blocklist.yaml — SSRF protection blocklists (pure-Go fallback).
#
# Used by the no-FFI IsSafeURL fallback. The real implementation is in Rust core.
# blockedHosts: hostnames/IPs that must not be accessed.
# blockedSchemes: URL schemes that must never be followed.
#
# Regenerate Go code: make data-gen

_gen:
  package: ffi
  build_tags: "no_ffi || !cgo"

blockedHosts:
  _type: "map[string]bool"
  _doc: "blockedHosts are hostnames that should not be accessed (SSRF protection)."
  _values:
    localhost: true
    "127.0.0.1": true
    "0.0.0.0": true
    "[::1]": true
    "::1": true
    metadata.google.internal: true
    "169.254.169.254": true

blockedSchemes:
  _type: "map[string]bool"
  _doc: "blockedSchemes are URL schemes that should never be followed."
  _values:
    file: true
    ftp: true
    gopher: true
    dict: true
    data: true
    ldap: true
    ldaps: true
    tftp: true
    telnet: true
