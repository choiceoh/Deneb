# tool_schemas.yaml — JSON Schema definitions for all agent tools.
#
# Each entry has:
#   name:        tool identifier (snake_case, matches *ToolSchema() Go function)
#   properties:  map of property name → property definition (ordered)
#   required:    optional list of required property names
#
# Property fields: type, description, default, minimum, maximum, minItems,
#                  maxItems, enum (list), items (nested def), properties (nested map)
#
# Regenerate Go code: make tool-schemas

# ---------------------------------------------------------------------------
# File tools
# ---------------------------------------------------------------------------

- name: read
  properties:
    file_path:
      type: string
      description: The absolute path to the file to read
    offset:
      type: number
      description: The line number to start reading from (1-based)
      minimum: 1
    limit:
      type: number
      description: "The number of lines to read (default: 2000)"
      default: 2000
      minimum: 1
    function:
      type: string
      description: "Read only this function/method/type. For .go files uses AST; for others uses regex. Overrides offset/limit"
    force:
      type: boolean
      description: "Force re-read even if cached (default: false)"
      default: false
  required:
    - file_path

- name: read_spillover
  properties:
    spill_id:
      type: string
      description: "The spillover reference ID (e.g., sp_abc123) from a previous large tool result"
  required:
    - spill_id

- name: write
  properties:
    file_path:
      type: string
      description: The absolute path to the file to write
    content:
      type: string
      description: The content to write to the file
  required:
    - file_path
    - content

- name: edit
  properties:
    file_path:
      type: string
      description: The absolute path to the file to modify
    old_string:
      type: string
      description: "The text to replace (must be unique unless replace_all is true). When regex=true, treated as a regex pattern"
    new_string:
      type: string
      description: "The text to replace it with. When regex=true, supports $1/$2 backreferences"
    replace_all:
      type: boolean
      description: "Replace all occurrences instead of requiring a unique match (default: false)"
      default: false
    regex:
      type: boolean
      description: "Treat old_string as a regex pattern (default: false)"
      default: false
    line:
      type: number
      description: "Replace at a specific line number (1-based). When set, old_string matches only on this line"
      minimum: 1
  required:
    - file_path
    - old_string
    - new_string

- name: grep
  properties:
    pattern:
      type: string
      description: Regular expression pattern to search for
    path:
      type: string
      description: File or directory to search in
    include:
      type: string
      description: "Glob pattern to filter files (e.g. \"*.ts\")"
    contextLines:
      type: number
      description: "Lines of context around each match (0-10)"
      default: 0
      minimum: 0
      maximum: 10
    before:
      type: number
      description: Lines of context before each match (overrides contextLines for before)
      minimum: 0
      maximum: 10
    after:
      type: number
      description: Lines of context after each match (overrides contextLines for after)
      minimum: 0
      maximum: 10
    ignoreCase:
      type: boolean
      description: Case-insensitive search
      default: false
    maxResults:
      type: number
      description: Maximum matches to return
      default: 100
      minimum: 1
      maximum: 500
    fileType:
      type: string
      description: "File type filter for ripgrep --type (e.g. \"go\", \"py\", \"js\")"
    multiline:
      type: boolean
      description: "Enable multiline matching (patterns can span lines, . matches newlines)"
      default: false
    mode:
      type: string
      description: "Output mode: content (default, matching lines), files_only (file paths only), count (match counts per file)"
      enum:
        - content
        - files_only
        - count
  required:
    - pattern

- name: find
  properties:
    pattern:
      type: string
      description: "Glob pattern to match files (supports ** for recursive matching, e.g. \"**/*.go\")"
    path:
      type: string
      description: Directory to search in
    showHidden:
      type: boolean
      description: "Include hidden directories (starting with .) in search"
      default: false
  required:
    - pattern

# ---------------------------------------------------------------------------
# Code tools
# ---------------------------------------------------------------------------

- name: multi_edit
  properties:
    edits:
      type: array
      description: "List of edits to apply. Each edit targets one file with one search-and-replace"
      items:
        type: object
        properties:
          file_path:
            type: string
            description: Path to the file to edit
          old_string:
            type: string
            description: Text to find and replace
          new_string:
            type: string
            description: Replacement text
          replace_all:
            type: boolean
            description: "Replace all occurrences (default: false)"
            default: false
        required:
          - file_path
          - old_string
          - new_string
      minItems: 1
      maxItems: 50
  required:
    - edits

- name: tree
  properties:
    path:
      type: string
      description: Directory to display (defaults to workspace root)
    depth:
      type: number
      description: "Max directory depth to display (default: 3, max: 6)"
      default: 3
      minimum: 1
      maximum: 6
    show_hidden:
      type: boolean
      description: "Include hidden files/directories (default: false)"
      default: false
    dirs_only:
      type: boolean
      description: "Show only directories, no files (default: false)"
      default: false
    pattern:
      type: string
      description: "Filter: only show entries matching this glob pattern (e.g. \"*.go\")"

- name: diff
  properties:
    mode:
      type: string
      description: "Diff mode: 'staged' (git diff --cached), 'unstaged' (git diff), 'all' (staged+unstaged vs HEAD), 'commit' (show a commit), 'branch' (compare branches), 'files' (compare two files)"
      enum:
        - staged
        - unstaged
        - all
        - commit
        - branch
        - files
      default: unstaged
    path:
      type: string
      description: Limit diff to a specific file or directory path
    ref:
      type: string
      description: "Git ref for 'commit' mode (e.g. HEAD~1, abc1234), or base ref for 'branch' mode"
    ref2:
      type: string
      description: "Second ref for 'branch' mode (compared against ref). For 'files' mode: second file path"
    stat_only:
      type: boolean
      description: "Show only file-level summary (--stat), not full diff content"
      default: false
    context_lines:
      type: number
      description: "Number of context lines around changes (default: 3)"
      default: 3
      minimum: 0
      maximum: 20

- name: analyze
  properties:
    action:
      type: string
      description: Analysis action
      enum:
        - outline
        - symbols
        - references
        - imports
        - signature
    file:
      type: string
      description: File path for outline/imports/signature analysis
    path:
      type: string
      description: Directory path for symbols/references/imports search
    query:
      type: string
      description: Symbol name to search for (symbols/references/signature)
    kind:
      type: string
      description: Filter symbols by kind
      enum:
        - func
        - type
        - method
        - const
        - var
        - interface
        - struct
    symbol:
      type: string
      description: Symbol name for references action
    reverse:
      type: boolean
      description: "For imports: show who imports this package (reverse dependency)"
      default: false
  required:
    - action

- name: test
  properties:
    action:
      type: string
      description: Action to perform
      enum:
        - run
        - build
        - check
    framework:
      type: string
      description: Build/test framework
      enum:
        - go
        - cargo
        - make
      default: go
    path:
      type: string
      description: "Package path or directory (e.g. './internal/chat/...')"
    filter:
      type: string
      description: "Test name filter (go: -run, cargo: --test)"
    verbose:
      type: boolean
      description: Verbose output (show all test names)
      default: false
    timeout:
      type: number
      description: "Timeout in seconds (default: 120, max: 600)"
      default: 120
      minimum: 10
      maximum: 600
    coverage:
      type: boolean
      description: Enable coverage reporting (go only)
      default: false
    target:
      type: string
      description: "Build target (make: target name, cargo: --bin/--lib)"
    release:
      type: boolean
      description: Release build (cargo --release)
      default: false
  required:
    - action

# ---------------------------------------------------------------------------
# Git tool
# ---------------------------------------------------------------------------

- name: git
  properties:
    action:
      type: string
      description: Git action to perform
      enum:
        - status
        - commit
        - log
        - branch
        - stash
        - blame
        - tag
        - merge
        - rebase
        - cherry_pick
        - reset
        - remote
        - clean
    message:
      type: string
      description: "Commit message (commit), stash message (stash push), tag annotation (tag)"
    files:
      type: array
      items:
        type: string
      description: "Files to stage before commit. Empty = commit currently staged files"
    all:
      type: boolean
      description: Stage all tracked changes before commit (git commit -a)
      default: false
    amend:
      type: boolean
      description: Amend the last commit
      default: false
    count:
      type: number
      description: "Number of log entries (default: 10, max: 50)"
      default: 10
      minimum: 1
      maximum: 50
    oneline:
      type: boolean
      description: One-line log format
      default: false
    author:
      type: string
      description: Filter log by author
    since:
      type: string
      description: "Filter log since date (e.g. '2024-01-01', '1 week ago')"
    path:
      type: string
      description: File path for log/blame
    grep:
      type: string
      description: Filter log by commit message grep pattern
    name:
      type: string
      description: Branch/tag/remote name
    delete:
      type: boolean
      description: Delete the named branch/tag
      default: false
    switch_to:
      type: boolean
      description: Switch to the named branch
      default: false
    create:
      type: boolean
      description: Create a new branch
      default: false
    from:
      type: string
      description: Base ref for branch creation
    file:
      type: string
      description: File path for blame
    start_line:
      type: number
      description: Start line for blame range
    end_line:
      type: number
      description: End line for blame range
    stash_action:
      type: string
      description: Stash sub-action
      enum:
        - push
        - pop
        - list
        - drop
        - apply
    branch:
      type: string
      description: Branch to merge
    no_ff:
      type: boolean
      description: No fast-forward merge
      default: false
    abort:
      type: boolean
      description: Abort in-progress merge/rebase/cherry-pick
      default: false
    continue_op:
      type: boolean
      description: Continue in-progress rebase/cherry-pick
      default: false
    onto:
      type: string
      description: Rebase onto target ref
    ref:
      type: string
      description: Git ref for cherry-pick or reset
    mode:
      type: string
      description: "Reset mode: soft, mixed (default), hard"
      enum:
        - soft
        - mixed
        - hard
    remote_action:
      type: string
      description: "Remote sub-action: list (default), add, remove"
      enum:
        - list
        - add
        - remove
    url:
      type: string
      description: Remote URL for add
    dry_run:
      type: boolean
      description: Show what would be removed without actually removing (clean)
      default: true
    directories:
      type: boolean
      description: Also remove untracked directories (clean -d)
      default: false
    force:
      type: boolean
      description: Force clean (-f). Required when dry_run is false
      default: false
    short:
      type: boolean
      description: Short status format
      default: false
  required:
    - action

# ---------------------------------------------------------------------------
# Exec / process tools
# ---------------------------------------------------------------------------

- name: exec
  max_output: 51200  # 50K chars — matches exec's internal TruncateForLLM budget
  properties:
    command:
      type: string
      description: Shell command to execute
    workdir:
      type: string
      description: Working directory (defaults to workspace root)
    timeout:
      type: number
      description: "Timeout in seconds (default: 60, max: 600)"
      default: 60
      minimum: 1
      maximum: 600
    background:
      type: boolean
      description: "Run in background immediately, then use process tool to check output"
      default: false
    structured:
      type: boolean
      description: "Return JSON with stdout, stderr, exit_code, runtime_ms instead of plain text"
      default: false
    env:
      type: object
      description: "Environment variables to set for this command (key-value pairs). Blocked keys (API keys, secrets) are filtered."
      additionalProperties:
        type: string
  required:
    - command

- name: process
  properties:
    action:
      type: string
      description: Process action
      enum:
        - list
        - poll
        - log
        - write
        - kill
    sessionId:
      type: string
      description: Session ID for actions other than list
    input:
      type: string
      description: "Data to write to process stdin (required for write action)"
    timeout:
      type: number
      description: Poll timeout in milliseconds
  required:
    - action

# ---------------------------------------------------------------------------
# Web tools
# ---------------------------------------------------------------------------

- name: web
  properties:
    url:
      type: string
      description: "URL to fetch and extract content. Handles HTML (noise-stripped), JSON, PDF/Office. Bot-block evasion included"
    query:
      type: string
      description: "Web search query. Perplexity (AI answer + citations) > Brave Search > DuckDuckGo fallback"
    fetch:
      type: number
      description: "With query: auto-fetch top N results in parallel (1-3, default: 0). Saves round-trip vs separate fetches"
    maxChars:
      type: number
      description: "Maximum content characters per result (default: 50000)"
    count:
      type: number
      description: "Number of search results (default: 5)"

- name: http
  properties:
    url:
      type: string
      description: HTTP or HTTPS URL
    method:
      type: string
      description: HTTP method
      enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      default: GET
    headers:
      type: object
      description: Request headers as key-value pairs
      additionalProperties: true
    body:
      type: string
      description: Request body as string
    json:
      type: object
      description: "JSON body (auto-sets Content-Type: application/json)"
      additionalProperties: true
    timeout:
      type: number
      description: Timeout in seconds
      default: 30
      minimum: 1
      maximum: 120
    max_response_chars:
      type: number
      description: Maximum response characters to return
      default: 50000
  required:
    - url

# ---------------------------------------------------------------------------
# Memory / search tools
# ---------------------------------------------------------------------------

- name: memory
  properties:
    action:
      type: string
      enum:
        - search
        - get
        - set
        - forget
        - recall
        - status
        - browse
        - log
        - daily
      description: "Action: search (hybrid FTS+vector search), get (fetch fact by ID), set (create fact), forget (deactivate fact), recall (deep recall with entity expansion and relation chains), status (memory stats + top fact previews), browse (list/explore facts by category with pagination and sorting), log (append detailed narrative entry to diary file — memory/diary/diary-YYYY-MM-DD.md), daily (read recent diary entries)"
    query:
      type: string
      description: "Search query (for search), fact content (for set), or diary entry body (for log)"
    fact_id:
      type: integer
      description: "Fact ID (for get/forget actions)"
    category:
      type: string
      enum:
        - decision
        - preference
        - solution
        - context
        - user_model
        - mutual
      description: "Category filter (search/browse) or category assignment (set)"
    importance:
      type: number
      description: "Importance score 0.0-1.0 (for set action, default: 0.5)"
      minimum: 0
      maximum: 1
    limit:
      type: integer
      description: "Max results to return (search: default 10, browse: default 20)"
      minimum: 1
      maximum: 50
    sort:
      type: string
      enum:
        - importance
        - recent
        - created
      description: "Sort order for browse action: importance (default), recent (updated_at desc), created (created_at desc)"
    offset:
      type: integer
      description: "Pagination offset for browse action (default: 0)"
      minimum: 0
    title:
      type: string
      description: "Short heading for a diary entry (log action). Optional — omit for untitled entries"
    days:
      type: integer
      description: "How many days of diary to read (daily action, default: 2 = today + yesterday, max: 7)"
      minimum: 1
      maximum: 7
  required:
    - action

# ---------------------------------------------------------------------------
# System tools
# ---------------------------------------------------------------------------

- name: health_check
  properties:
    component:
      type: string
      enum:
        - all
        - embedding
        - reranker
        - localai
        - memory
      description: "Component to check (default: all). embedding=Gemini API, reranker=Jina API, localai=local LLM, memory=aurora-memory DB"

- name: cron
  description: |
    Manage scheduled tasks (cron jobs). Actions: add (create), list (all jobs), status (service health),
    get (job detail), update (modify), remove (delete), run (execute now), runs (execution history).
    Schedule formats: cron expression (0 9 * * * = daily 9am), interval (30m, 1h), one-shot (ISO timestamp).
    Common patterns: 0 9 * * * (daily 9am), 0 */2 * * * (every 2h), 0 9 * * 1-5 (weekdays 9am), @daily, @hourly.
  properties:
    action:
      type: string
      description: "Cron action"
      enum:
        - status
        - list
        - add
        - update
        - remove
        - run
        - get
        - runs
        - wake
    name:
      type: string
      description: Job name (required for add, used as job ID)
    schedule:
      type: string
      description: "Schedule specification. Formats: cron (0 9 * * *), interval (1h, 30m, every 5m), timestamp (2026-04-06T08:00:00), shorthand (@daily, @hourly, @weekly)"
    command:
      type: string
      description: Agent message/command to execute on schedule (required for add)
    jobId:
      type: string
      description: Job ID for get/update/remove/run/runs actions
    enabled:
      type: boolean
      description: Enable or disable a job (for add/update)
    limit:
      type: integer
      description: Max entries to return (for runs action, default 10)
    tz:
      type: string
      description: "Timezone for cron schedules (e.g. Asia/Seoul, UTC). Defaults to system local timezone"
    staggerMs:
      type: integer
      description: "Random delay window in ms to distribute cron jobs (cron kind only, default: auto for top-of-hour)"
    anchorTime:
      type: string
      description: "Anchor time for interval schedules (ISO 8601). Intervals count from this time instead of registration time"
    retryCount:
      type: integer
      description: "Number of retry attempts on failure (0-3, default 0 = no retry)"
    retryBackoffMs:
      type: integer
      description: "Initial backoff delay between retries in ms (default 5000). Doubles each retry, capped at 60s"
    deliveryMode:
      type: string
      description: "How to deliver output: announce (send to Telegram, default) or none (run silently)"
      enum:
        - announce
        - none
    job:
      type: object
      description: Job definition object (alternative to top-level name/schedule/command)
      additionalProperties: true
    text:
      type: string
      description: System event text for wake action
  required:
    - action

- name: message
  properties:
    action:
      type: string
      description: Message action
      enum:
        - send
        - react
        - reply
        - thread-reply
    message:
      type: string
      description: Text content to send
    to:
      type: string
      description: Recipient (chat ID or user identifier)
    channel:
      type: string
      description: "Target channel (e.g., telegram)"
    replyTo:
      type: string
      description: Message ID to reply to
    emoji:
      type: string
      description: Emoji for react action
    messageId:
      type: string
      description: Message ID for react/reply actions
    silent:
      type: boolean
      description: Send without notification sound
  required:
    - action

- name: gateway
  properties:
    action:
      type: string
      description: Gateway action
      enum:
        - restart
        - config.get
        - config.schema.lookup
        - config.apply
        - config.patch
        - update.run
    path:
      type: string
      description: Config path for schema.lookup
    raw:
      type: string
      description: Raw config JSON for apply/patch
    reason:
      type: string
      description: Reason for restart
  required:
    - action

# ---------------------------------------------------------------------------
# Session tools
# ---------------------------------------------------------------------------

- name: sessions_list
  properties:
    limit:
      type: number
      description: Maximum sessions to return
      default: 50
      minimum: 1
    kinds:
      type: array
      items:
        type: string
        enum:
          - main
          - group
          - cron
          - hook
      description: Filter by session kind

- name: sessions_history
  properties:
    sessionKey:
      type: string
      description: Session key to fetch history for
    limit:
      type: number
      description: Number of messages to return
      default: 20
      minimum: 1
  required:
    - sessionKey

- name: sessions_search
  properties:
    query:
      type: string
      description: Search keyword to find in session transcripts
    maxResults:
      type: number
      description: "Maximum number of matching messages to return (default 20)"
      default: 20
      minimum: 1
      maximum: 100
  required:
    - query

- name: sessions_send
  properties:
    sessionKey:
      type: string
      description: Target session key
    message:
      type: string
      description: Message to send
  required:
    - message

- name: sessions_spawn
  properties:
    task:
      type: string
      description: Task description for the sub-agent
    label:
      type: string
      description: Human-readable label
    model:
      type: string
      enum: ["main", "lightweight", "fallback"]
      description: "Model role to use (default: main)"
    tool_preset:
      type: string
      enum: ["researcher", "implementer", "verifier"]
      description: "Tool preset restricting which tools the sub-agent can use. researcher=read-only, implementer=read+write+build, verifier=read+test+exec"
  required:
    - task

# ---------------------------------------------------------------------------
# Sub-agent tools
# ---------------------------------------------------------------------------

- name: subagents
  properties:
    action:
      type: string
      description: Sub-agent management action
      enum:
        - list
        - kill
        - steer
    target:
      type: string
      description: Target sub-agent ID or label
    message:
      type: string
      description: Steering message for steer action

# ---------------------------------------------------------------------------
# Media tools
# ---------------------------------------------------------------------------

- name: image
  properties:
    prompt:
      type: string
      description: What to analyze in the image(s)
    image:
      type: string
      description: Single image path or URL
    images:
      type: array
      items:
        type: string
      description: "Multiple image paths or URLs (up to 20)"
    model:
      type: string
      enum: ["main", "lightweight", "fallback"]
      description: "Model role to use (default: lightweight)"

- name: youtube_transcript
  properties:
    url:
      type: string
      description: "YouTube video URL (youtube.com/watch?v=... or youtu.be/...)"
  required:
    - url

- name: send_file
  properties:
    file_path:
      type: string
      description: Path to the file to send
    type:
      type: string
      description: Media type. Auto-detected from MIME if omitted
      enum:
        - photo
        - document
        - video
        - audio
        - voice
    caption:
      type: string
      description: Caption text (optional)
    silent:
      type: boolean
      description: Send without notification sound
  required:
    - file_path

# ---------------------------------------------------------------------------
# Data tools
# ---------------------------------------------------------------------------

- name: kv
  properties:
    action:
      type: string
      description: KV store action
      enum:
        - get
        - set
        - delete
        - list
    key:
      type: string
      description: "Key name (dot-separated for namespaces, e.g., 'prefs.timezone')"
    value:
      type: string
      description: Value to store (for set action)
    prefix:
      type: string
      description: Key prefix filter (for list action)
  required:
    - action

- name: gmail
  properties:
    action:
      type: string
      description: Gmail action to perform
      enum:
        - inbox
        - search
        - read
        - send
        - reply
        - label
        - analyze
    query:
      type: string
      description: "Gmail search query (supports Gmail operators like from:, to:, subject:, newer_than:, is:unread, has:attachment, etc.)"
    message_id:
      type: string
      description: Email message or thread ID (for read, reply, label actions)
    to:
      type: string
      description: "Recipient email or contact alias (auto-resolved from KV store gmail.contacts.<alias>)"
    cc:
      type: string
      description: "CC recipient(s), comma-separated"
    bcc:
      type: string
      description: "BCC recipient(s), comma-separated"
    subject:
      type: string
      description: Email subject line
    body:
      type: string
      description: Email body text (plain text or HTML if html=true)
    html:
      type: boolean
      description: "Send body as HTML (default: false)"
      default: false
    max:
      type: number
      description: "Maximum results (for inbox/search, default: 10, max: 50)"
      default: 10
      minimum: 1
      maximum: 50
    timeout:
      type: number
      description: "Timeout in seconds (default: 30, max: 60)"
      default: 30
      minimum: 1
      maximum: 60
    label_action:
      type: string
      description: Label sub-action (for label action)
      enum:
        - list
        - add
        - remove
    label_name:
      type: string
      description: Label name (for label add/remove)
  required:
    - action

# ---------------------------------------------------------------------------
# Hidden tools (pilot-only)
# ---------------------------------------------------------------------------

- name: agent_logs
  properties:
    run_id:
      type: string
      description: "특정 런 ID로 필터 (생략 시 전체)"
    type:
      type: string
      description: "로그 타입 필터: run.start, run.prep, turn.llm, turn.tool, run.end, run.error"
      enum:
        - run.start
        - run.prep
        - turn.llm
        - turn.tool
        - run.end
        - run.error
    limit:
      type: integer
      description: "최대 반환 수 (기본 50, 최대 500)"
      default: 50
      minimum: 1
      maximum: 500

- name: gateway_logs
  properties:
    lines:
      type: integer
      description: "최근 N줄 반환 (기본 100, 최대 500)"
      default: 100
      minimum: 1
      maximum: 500
    level:
      type: string
      description: "로그 레벨 필터: error, warn, info, debug (해당 레벨 이상만 표시)"
      enum:
        - error
        - warn
        - info
        - debug
    pattern:
      type: string
      description: "정규식 패턴 필터 (매칭되는 줄만 표시)"
    pkg:
      type: string
      description: "패키지 필터 (예: server, chat, telegram, rpc)"

# ---------------------------------------------------------------------------
# Advanced tools (composed from basic tools)
# ---------------------------------------------------------------------------

- name: batch_read
  properties:
    files:
      type: array
      description: "List of files to read (up to 20). Each entry supports the same options as the read tool"
      items:
        type: object
        properties:
          file_path:
            type: string
            description: Absolute path to the file
          offset:
            type: number
            description: "Line number to start from (1-based)"
            minimum: 1
          limit:
            type: number
            description: "Number of lines to read (default: 2000)"
            minimum: 1
          function:
            type: string
            description: "Read only this function/method/type"
        required:
          - file_path
      minItems: 1
      maxItems: 40
  required:
    - files

- name: search_and_read
  properties:
    pattern:
      type: string
      description: Regex pattern to search for (same as grep)
    path:
      type: string
      description: Directory to search in
    include:
      type: string
      description: "Glob pattern to filter files (e.g. \"*.go\")"
    fileType:
      type: string
      description: "File type filter for ripgrep --type (e.g. \"go\", \"py\")"
    context_lines:
      type: number
      description: "Lines of context around each match in the file read (default: 10)"
      default: 10
      minimum: 0
      maximum: 50
    max_files:
      type: number
      description: "Maximum number of matching files to read (default: 5)"
      default: 5
      minimum: 1
      maximum: 20
  required:
    - pattern

- name: inspect
  properties:
    file:
      type: string
      description: File path to inspect
    symbol:
      type: string
      description: "Specific symbol to inspect (function, type, method name). Enables symbol-level depth automatically"
    depth:
      type: string
      description: "Inspection depth: shallow (outline+imports), deep (+git log+stats), symbol (+references+blame)"
      enum:
        - shallow
        - deep
        - symbol
      default: shallow
  required:
    - file

- name: apply_patch
  properties:
    patch:
      type: string
      description: "Unified diff content (output of git diff, diff -u, etc.)"
    strip:
      type: number
      description: "Strip leading path components (like git apply -pN, default: 1)"
      default: 1
    dry_run:
      type: boolean
      description: "Check if patch applies cleanly without modifying files (default: false)"
      default: false
  required:
    - patch

# ---------------------------------------------------------------------------
# Morning letter tool
# ---------------------------------------------------------------------------

- name: morning_letter
  properties: {}

# ---------------------------------------------------------------------------
# Autoresearch tool — autonomous experiment loop (karpathy/autoresearch)
# ---------------------------------------------------------------------------

- name: autoresearch
  properties:
    action:
      type: string
      enum:
        - init
        - start
        - stop
        - status
        - results
        - apply_overrides
      description: "init: configure experiment, start: begin autonomous loop, stop: halt loop, status: check progress, results: get log, apply_overrides: bake best-found constant overrides into source files"
    workdir:
      type: string
      description: "Experiment workspace directory (absolute path)"
    target_files:
      type: array
      items:
        type: string
      description: "Files the agent may edit, relative to workdir (init only)"
    metric_cmd:
      type: string
      description: "Shell command to run experiment and print metric value on last line (init only)"
    metric_name:
      type: string
      description: "Human-readable metric name, e.g. val_bpb, test_pass_rate (init only)"
    metric_direction:
      type: string
      enum:
        - minimize
        - maximize
      description: "Whether to minimize or maximize the metric (init only)"
    time_budget_sec:
      type: number
      description: "Fixed time budget per experiment in seconds (init only, default: 300)"
      default: 300
      minimum: 10
    branch_tag:
      type: string
      description: "Tag for the experiment branch autoresearch/<tag> (init only)"
    model:
      type: string
      description: "LLM model for hypothesis generation (init only, default: claude-sonnet-4-20250514)"
    metric_pattern:
      type: string
      description: "Regex with one capture group to extract the metric value from experiment output (init only). Example: 'val_bpb:\\s*([\\d.]+)' extracts 1.087 from 'val_bpb: 1.087'. If omitted, uses default heuristic (last number on last stdout line)."
    max_iterations:
      type: number
      description: "Max iterations before auto-stop and sending completion report (init only, default: 30). Set -1 for unlimited."
      default: 30
      minimum: -1
    cache_enabled:
      type: boolean
      description: "Enable persistent cache directory for experiment commands (init only). When true, sets AUTORESEARCH_CACHE_DIR env var so expensive operations (LLM inference, embeddings) can cache results across iterations."
      default: false
    format:
      type: string
      enum:
        - tsv
        - summary
        - chart
      description: "Output format for results action. chart generates a PNG graph of metric progression (default: summary)"
      default: summary
    constants:
      type: array
      description: "Constants to optimize in override mode (init only). When set, the agent proposes override values instead of rewriting files."
      items:
        type: object
        properties:
          name:
            type: string
            description: "Constant identifier (e.g. LEARNING_RATE)"
          file:
            type: string
            description: "File containing the constant (relative to workdir)"
          pattern:
            type: string
            description: "Regex with one capture group for the value (e.g. 'lr\\s*=\\s*([\\d.]+)')"
          type:
            type: string
            enum:
              - float
              - int
              - string
            description: "Value type"
          min:
            type: number
            description: "Optional lower bound (float/int only)"
          max:
            type: number
            description: "Optional upper bound (float/int only)"
        required:
          - name
          - file
          - pattern
          - type
  required:
    - action
    - workdir

# ---------------------------------------------------------------------------
# Autonomous continuation
# ---------------------------------------------------------------------------

- name: continue_run
  properties:
    reason:
      type: string
      description: "Brief description of remaining work for the next continuation run"
    progress_summary:
      type: string
      description: "Summary of what was accomplished in this run (sent to user as progress report)"
  required:
    - reason
    - progress_summary

# ---------------------------------------------------------------------------
# Deferred tool activation
# ---------------------------------------------------------------------------

- name: fetch_tools
  properties:
    names:
      type: array
      description: "Exact tool names to activate (from the deferred tools list)"
      items:
        type: string
      minItems: 1
      maxItems: 10
    query:
      type: string
      description: "Keyword search to find matching deferred tools (alternative to names)"
  required: []

# ---------------------------------------------------------------------------
# Skills discovery
# ---------------------------------------------------------------------------

- name: skills_list
  properties:
    query:
      type: string
      description: "Search filter to match skill name, description, category, or tag"
    category:
      type: string
      description: "Filter by skill category (e.g., coding, productivity, devops)"
  required: []

- name: skill_manage
  properties:
    action:
      type: string
      description: "Skill management action"
      enum:
        - create
        - patch
        - delete
        - read
        - list_files
    name:
      type: string
      description: "Skill name (lowercase, hyphens). Must match directory name."
    category:
      type: string
      description: "Skill category directory (coding, productivity, devops, integration). Required for create."
    content:
      type: string
      description: "Full SKILL.md content for create, or patch content. Must include valid frontmatter."
    old_text:
      type: string
      description: "Text to find in existing SKILL.md (for patch action). Fuzzy: indentation and trailing whitespace differences are absorbed automatically."
    new_text:
      type: string
      description: "Replacement text (for patch action). Written verbatim."
    file_path:
      type: string
      description: "Relative path within skill directory for auxiliary files (scripts/, references/)"
    file_content:
      type: string
      description: "Content for auxiliary file writes"
  required:
    - action
    - name

# ---------------------------------------------------------------------------
# Bridge (inter-agent communication)
# ---------------------------------------------------------------------------

- name: bridge
  properties:
    message:
      type: string
      description: "Message to send to the other agent"
    source:
      type: string
      description: "Your identity (default: 'deneb')"
      default: deneb
  required:
    - message

# ---------------------------------------------------------------------------
# Planning (progress tracking)
# ---------------------------------------------------------------------------

- name: update_plan
  properties:
    steps:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
            description: "Short description of this step"
          status:
            type: string
            enum: ["pending", "in_progress", "completed", "failed"]
            description: "Current status of this step"
          note:
            type: string
            description: "Optional note (what was tried, what failed, what to do next)"
      description: "Plan steps with their current status. Keep exactly one step as in_progress"
    summary:
      type: string
      description: "Brief overall progress summary (shown to user as status update)"
  required:
    - steps
