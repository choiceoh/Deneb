# tool_classification.yaml — Tool behavior classification sets.
#
# mutatingTools: tools that change filesystem or run commands (need verification).
# toolCompressSkipSet: tools whose output should not be LLM-compressed.
#
# Regenerate Go code: make data-gen

_gen:
  package: chat

mutatingTools:
  _type: "map[string]bool"
  _doc: |-
    mutatingTools are tools that change the filesystem or run commands.
    When a run uses these, it likely needs a verification follow-up.
  _values:
    edit: true
    write: true
    exec: true
    git: true
    multi_edit: true
    notebook_edit: true

toolApprovalPolicy:
  _type: "map[string]string"
  _doc: |-
    toolApprovalPolicy classifies tools by their autonomous execution safety.
    "auto": safe for autonomous execution without user confirmation.
    "confirm": requires user confirmation before execution (mutating/external).
    "block": never executed by autonomous agents (dangerous system operations).
    Used by the agent executor to gate tool calls in autonomous contexts
    (cron jobs, subagents, deep work mode).
  _values:
    # Auto: safe read-only tools — execute freely.
    read: "auto"
    grep: "auto"
    find: "auto"
    tree: "auto"
    diff: "auto"
    analyze: "auto"
    batch_read: "auto"
    search_and_read: "auto"
    inspect: "auto"
    read_spillover: "auto"
    health_check: "auto"
    sessions_list: "auto"
    skills_list: "auto"
    agent_logs: "auto"
    gateway_logs: "auto"
    web_search: "auto"
    web_fetch: "auto"
    image_describe: "auto"
    memory: "auto"
    kv: "auto"
    process: "auto"
    # Confirm: mutating tools — confirm in autonomous contexts.
    edit: "confirm"
    write: "confirm"
    multi_edit: "confirm"
    notebook_edit: "confirm"
    exec: "confirm"
    git: "confirm"
    send_file: "confirm"
    # RLM: wiki + project data access + sub-LLM spawning.
    wiki: "auto"
    projects_list: "auto"
    projects_get_field: "auto"
    projects_search: "auto"
    projects_get_document: "auto"
    # RLM Phase 2: sub-LLM spawning (external LLM calls).
    llm_spawn: "confirm"
    llm_spawn_batch: "confirm"
    # Block: never auto-execute — too dangerous for unsupervised runs.
    bridge: "block"

channelSilentTools:
  _type: "map[string][]string"
  _doc: |-
    channelSilentTools lists tools that suppress chat delivery on specific
    channels. When the agent calls one of these tools, the response is not
    delivered as a chat message — the tool executes normally but the chat
    output is silenced. Management tools (cron, etc.) execute in the
    background; results are accessible via MCP/API.
  _values:
    telegram:
      # Routine / scheduling
      - cron
      - gmail
      - morning_letter
      # System / gateway control
      - gateway
      - health_check
      - message
      - process
      # Session management
      - sessions_list
      - sessions_history
      - sessions_search
      - sessions_send
      - sessions_spawn
      - subagents
      # Logs / diagnostics
      - agent_logs
      - gateway_logs
      # Data / internal
      - kv
      - bridge
      - autoresearch
      # Skill management
      - skills_list
      - skill_manage

toolCompressSkipSet:
  _type: "map[string]bool"
  _doc: |-
    toolCompressSkipSet contains tools whose output should not be compressed.
    Structured-output tools are already handled by post-processors.
    Internal / already-small tools add no compression value.
  _values:
    # Structured-output tools
    grep: true
    find: true
    tree: true
    git: true
    analyze: true
    diff: true
    # Internal / already-small tools
    memory: true
    wiki: true
    kv: true
    sessions_list: true
