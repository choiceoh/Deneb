# tool_classification.yaml — Tool behavior classification sets.
#
# mutatingTools: tools that change filesystem or run commands (need verification).
# toolCompressSkipSet: tools whose output should not be LLM-compressed.
#
# Regenerate Go code: make data-gen

_gen:
  package: chat

mutatingTools:
  _type: "map[string]bool"
  _doc: |-
    mutatingTools are tools that change the filesystem or run commands.
    When a run uses these, it likely needs a verification follow-up.
  _values:
    edit: true
    write: true
    exec: true
    git: true
    multi_edit: true
    notebook_edit: true

toolCompressSkipSet:
  _type: "map[string]bool"
  _doc: |-
    toolCompressSkipSet contains tools whose output should not be compressed.
    Structured-output tools are already handled by post-processors.
    Internal / already-small tools add no compression value.
  _values:
    # Structured-output tools
    grep: true
    find: true
    tree: true
    git: true
    analyze: true
    diff: true
    # Internal / already-small tools
    memory: true
    kv: true
    sessions_list: true
