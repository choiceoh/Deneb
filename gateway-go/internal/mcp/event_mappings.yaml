# event_mappings.yaml — MCP event-to-resource and sampling mappings.
#
# eventToResourceURI: gateway events -> affected MCP resource URIs.
# eventRequiresSampling: events that trigger Claude analysis.
#
# Regenerate Go code: make data-gen

_gen:
  package: mcp

eventToResourceURI:
  _type: "map[string]string"
  _doc: "eventToResourceURI maps gateway event names to affected resource URIs."
  _values:
    session.created: "deneb://sessions"
    session.completed: "deneb://sessions"
    session.failed: "deneb://sessions"
    session.killed: "deneb://sessions"
    agent.completed: "deneb://sessions"
    config.changed: "deneb://config"
    skills.changed: "deneb://skills"
    memory.updated: "deneb://memory"

eventRequiresSampling:
  _type: "map[string]bool"
  _doc: "eventRequiresSampling lists events that should trigger Claude analysis."
  _values:
    session.failed: true
    agent.completed: true
    cron.fired: true
