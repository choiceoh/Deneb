# env_blocklist.yaml — Blocked environment variables for subprocess sandboxing.
#
# Variables that can be exploited to inject code into child processes via
# build-tool hooks, dynamic linker manipulation, or language runtime hooks.
#
# Regenerate Go code: make data-gen

_gen:
  package: process

blockedEnvKeys:
  _type: "map[string]bool"
  _doc: |-
    blockedEnvKeys lists environment variable names that must be stripped
    from subprocess environments.
  _values:
    # Dynamic linker
    LD_PRELOAD: true
    LD_LIBRARY_PATH: true
    # Shell injection
    BASH_ENV: true
    ENV: true
    ZDOTDIR: true
    # JVM injection
    MAVEN_OPTS: true
    SBT_OPTS: true
    GRADLE_OPTS: true
    _JAVA_OPTIONS: true
    JAVA_TOOL_OPTIONS: true
    # Language runtimes
    PYTHONSTARTUP: true
    PERL5OPT: true
    RUBYOPT: true
    # .NET
    DOTNET_STARTUP_HOOKS: true
    DOTNET_ROOT: true
    # glibc tunables
    GLIBC_TUNABLES: true

blockedEnvPrefixes:
  _type: "[]string"
  _doc: "blockedEnvPrefixes lists environment variable prefixes that should be blocked."
  _values:
    - "DYLD_"
    - "LD_AUDIT"
