# role_permissions.yaml — RBAC role-to-scope permission matrix.
#
# Defines the default scopes granted to each client role.
# Matches CLI_DEFAULT_OPERATOR_SCOPES in src/gateway/method-scopes.ts.
#
# Regenerate Go code: make data-gen

_gen:
  package: auth

rolePermissions:
  _type: "map[Role][]Scope"
  _doc: "rolePermissions defines the default scopes for each role."
  _values:
    RoleOperator: [ScopeAdmin, ScopeRead, ScopeWrite, ScopeApprovals, ScopePairing]
    RoleViewer: [ScopeRead]
    RoleAgent: [ScopeRead, ScopeWrite]
    RoleProbe: [ScopeRead]
