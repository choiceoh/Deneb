# Model capability definitions — edit here, then run: make model-caps
#
# This file is the source of truth for model-level capability flags.
# model_caps_gen.go is generated from this file; do not edit it directly.

# Models (by normalized provider ID) that support xhigh thinking.
# Matching uses exact equality or prefix (e.g. "gpt-5.4" matches "gpt-5.4-turbo").
xhigh_thinking:
  openai:
    - gpt-5.4
    - gpt-5.4-pro
    - gpt-5.4-mini
    - gpt-5.4-nano
    - gpt-5.2
  openai-codex:
    - gpt-5.4
    - gpt-5.3-codex
    - gpt-5.3-codex-spark
    - gpt-5.2-codex
    - gpt-5.1-codex

# Regex patterns (Go syntax) for model IDs that default to adaptive thinking.
# Keys are normalized provider IDs.
adaptive_thinking_patterns:
  anthropic: '(?i)^claude-(?:opus|sonnet)-4(?:\.|-)6(?:$|[-.])'
  amazon-bedrock: '(?i)claude-(?:opus|sonnet)-4(?:\.|-)6(?:$|[-.])'
