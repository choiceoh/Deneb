version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - ineffassign
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - predeclared
    - durationcheck
    - nilerr
    - bodyclose
    - noctx
    - errname
    - errorlint
    - exhaustive
    - copyloopvar
    - intrange
    - gosec
    - nakedret
    - thelper
    - usestdlibvars
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: unexported-return
        - name: var-declaration
        - name: var-naming
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - commentedOutCode
    staticcheck:
      checks:
        - all
    gosec:
      excludes:
        - G104  # Handled via errcheck linter instead.
        - G304  # File path from variable — common in gateway serving files.
    nakedret:
      max-func-lines: 20
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files: relax errcheck, style, and security linters.
      - path: "_test\\.go$"
        linters:
          - errcheck
          - gocritic
          - unparam
          - gosec
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
