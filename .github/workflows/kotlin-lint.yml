# kotlin-lint.yml — formatting + bug-lint gate for the native client.
#
# The gateway has had a lint gate (golangci) from the start; the Kotlin side
# had spotless configured but never enforced (118 files drifted before this
# gate landed) and no bug-focused analysis at all. This runs both on every
# client PR:
#   - spotlessCheck: ktlint formatting (config in client-android/app/build.gradle.kts)
#   - detekt: bug catchers only (config/detekt.yml; style rulesets are off,
#     accepted pre-existing findings live in config/detekt-baseline.xml —
#     baseline updates need operator approval per .claude/rules/testing.md)
#   - desktopTest smoke subset: stable shared/common logic tests on the desktop
#     JVM path so client regressions are caught before merge without inheriting
#     the currently flaky chat-viewmodel suite
#   - android compile: :composeApp:compileAndroidMain + :androidApp:compileFossReleaseKotlin.
#     compileKotlinDesktop only type-checks the desktop source set, so commonMain
#     code that resolves only on the Android target (#2698) and stale androidApp
#     references (#2702) compiled clean here yet broke publish-apk. These are the
#     exact tasks the fossRelease APK build depends on. ubuntu-latest ships the
#     Android SDK (ANDROID_HOME=/usr/local/lib/android/sdk), so no SDK setup is
#     needed; it is x86_64 so Kotlin/Native is supported (the Android compile does
#     not use it regardless).
name: kotlin-lint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "client-android/**"
      - ".github/workflows/kotlin-lint.yml"

concurrency:
  group: kotlin-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: spotless + detekt + desktopTest smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client-android/app
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: spotlessCheck
        run: ./gradlew spotlessCheck --no-daemon

      - name: detekt
        run: ./gradlew detekt --no-daemon

      - name: desktopTest smoke subset
        run: |
          ./gradlew desktopTest --no-daemon \
            --tests 'ai.deneb.data.TaskStoreMigrationTest*' \
            --tests 'ai.deneb.data.CronExpressionTest*' \
            --tests 'ai.deneb.deneb.generated.MiniappWireTypesTest*' \
            --tests 'ai.deneb.data.AttachmentRouteTest*' \
            --tests 'ai.deneb.network.UiErrorTest*'

      # Android compile gate — catches breaks the desktop path cannot see (see the
      # file header). ubuntu-latest pre-sets ANDROID_HOME, so no SDK setup step.
      - name: android compile (composeApp androidMain + androidApp fossRelease)
        run: |
          ./gradlew --no-daemon \
            :composeApp:compileAndroidMain \
            :androidApp:compileFossReleaseKotlin
