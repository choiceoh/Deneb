# Verify protobuf definitions are valid and generated code is up to date.
name: Proto Check

on:
  pull_request:
    paths:
      - "proto/**"
      - "core-rs/build.rs"
      - "core-rs/Cargo.toml"
      - "scripts/proto-gen.sh"
  push:
    branches: [master]
    paths:
      - "proto/**"
      - "core-rs/build.rs"
      - "core-rs/Cargo.toml"
      - "scripts/proto-gen.sh"

jobs:
  lint:
    name: buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: cd proto && buf lint

  generate-check:
    name: proto generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            core-rs/target
            ~/.cargo/registry
            ~/.cargo/git
          key: proto-rust-${{ hashFiles('core-rs/Cargo.lock') }}
          restore-keys: proto-rust-

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ts-proto
        run: npm install -g ts-proto

      - name: Generate and verify
        run: ./scripts/proto-gen.sh --check

  breaking:
    name: buf breaking change detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - uses: bufbuild/buf-setup-action@v1

      - name: Detect breaking changes
        run: cd proto && buf breaking --against ../.git#subdir=proto,ref=origin/${{ github.base_ref }}
