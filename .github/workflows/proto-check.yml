# Detect breaking changes in protobuf wire format.
# Generation correctness is checked separately in generate-check.yml.
name: Proto Breaking

on:
  pull_request:
    paths:
      - "proto/**"

jobs:
  breaking:
    name: buf breaking change detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - uses: bufbuild/buf-setup-action@v1

      - name: Detect breaking changes
        run: cd proto && buf breaking --against ../.git#subdir=proto,ref=origin/${{ github.base_ref }}
