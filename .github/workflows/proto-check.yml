# Verify protobuf definitions are valid and generated code is up to date.
name: Proto Check

on:
  pull_request:
    paths:
      - "proto/**"
      - "core-rs/core/build.rs"
      - "core-rs/core/Cargo.toml"
      - "core-rs/Cargo.toml"
      - "scripts/proto-gen.sh"
  push:
    branches: [master]
    paths:
      - "proto/**"
      - "core-rs/core/build.rs"
      - "core-rs/core/Cargo.toml"
      - "core-rs/Cargo.toml"
      - "scripts/proto-gen.sh"

# Pin tool versions to match committed generated code.
# Update these when regenerating with newer tools.
env:
  PROTOC_GEN_GO_VERSION: v1.36.11
  TS_PROTO_VERSION: "2.11.6"

jobs:
  generate-check:
    name: proto generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup buf, Go, Rust, Node (parallel-safe)
        uses: bufbuild/buf-setup-action@v1

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            core-rs/target
            ~/.cargo/registry
            ~/.cargo/git
          key: proto-rust-${{ hashFiles('core-rs/Cargo.lock') }}
          restore-keys: proto-rust-

      - name: Install protoc + codegen plugins
        run: |
          sudo apt-get install -y protobuf-compiler &
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }} &
          npm install -g ts-proto@${{ env.TS_PROTO_VERSION }} &
          wait

      - name: Generate and verify
        run: ./scripts/proto-gen.sh --check

  breaking:
    name: buf breaking change detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - uses: bufbuild/buf-setup-action@v1

      - name: Detect breaking changes
        run: cd proto && buf breaking --against ../.git#subdir=proto,ref=origin/${{ github.base_ref }}
