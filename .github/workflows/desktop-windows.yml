name: Desktop (Windows MSI)

# Builds the native client (client-android Compose Multiplatform desktop target) into a
# Windows .msi installer. jpackage can only produce Windows installers ON Windows — the
# rest of CI runs on Linux ARM, so this is the one job that needs a windows-latest runner.
#
# Triggers:
#   - workflow_dispatch: manual build to validate the MSI on demand.
#   - pull_request (client-android changes only): regression-guard the Windows build.
#   - release published: attach the .msi to the GitHub release.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "client-android/**"
      - ".github/workflows/desktop-windows.yml"
  release:
    types: [published]

concurrency:
  group: desktop-windows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to attach assets on the release event

jobs:
  build-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: client-android/app
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          # Full history so the build can derive a monotonic versionCode from the commit
          # count (git rev-list --count HEAD). A shallow clone would report 1.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21" # bundles jpackage

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # jpackage shells out to WiX's candle.exe/light.exe to assemble the MSI. WiX v3 ships
      # preinstalled on windows-latest but is often missing from PATH; WiX v4 is incompatible
      # with jpackage, so we pin v3 explicitly (with a Chocolatey fallback).
      - name: Ensure WiX v3 on PATH
        shell: pwsh
        run: |
          $wix = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset v3*" -Directory -ErrorAction SilentlyContinue |
                 Sort-Object Name -Descending | Select-Object -First 1
          if ($wix) {
            "$($wix.FullName)\bin" >> $env:GITHUB_PATH
            Write-Host "WiX found: $($wix.FullName)\bin"
          } else {
            Write-Host "WiX v3 not found; installing via Chocolatey"
            choco install wixtoolset --version=3.14.0 -y --no-progress
            "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH
          }

      - name: Build release MSI
        shell: pwsh
        # The MSI ProductVersion must strictly increase or Windows Installer skips the
        # upgrade (every build was 0.0.<floor> before, so new installers were no-ops). The
        # APK's serve-dir auto-code is unreachable from this Windows runner, so derive a
        # monotonic code from the git commit count and feed it to packageVersion + the
        # in-app DENEB_VERSION_CODE.
        run: |
          $code = "$(git rev-list --count HEAD)".Trim()
          Write-Host "denebVersionCode=$code (git commit count) -> MSI 0.0.$code"
          ./gradlew :composeApp:packageReleaseMsi "-PdenebVersionCode=$code" --no-daemon --stacktrace

      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Recurse -Filter *.msi -Path composeApp/build/compose/binaries |
                 Select-Object -First 1
          if (-not $msi) { Write-Error "No MSI produced"; exit 1 }
          Write-Host "MSI: $($msi.FullName)"
          "path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: deneb-windows-msi
          path: ${{ steps.msi.outputs.path }}
          retention-days: 14

      # Release-only: checksum + attach to the GitHub release (mirrors release-please.yml).
      - name: Generate SHA256 checksum
        if: github.event_name == 'release'
        shell: pwsh
        env:
          MSI_PATH: ${{ steps.msi.outputs.path }}
          MSI_NAME: ${{ steps.msi.outputs.name }}
        run: |
          $hash = (Get-FileHash $env:MSI_PATH -Algorithm SHA256).Hash.ToLower()
          "$hash  $env:MSI_NAME" | Out-File -Encoding ascii "$env:MSI_PATH.sha256"

      - name: Attach MSI to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.msi.outputs.path }}
            ${{ steps.msi.outputs.path }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
