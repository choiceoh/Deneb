# CI pipeline for Rust (core-rs) and Go (gateway-go) components.
#
# Runs on PRs and pushes that touch Rust, Go, or protobuf files.
# The existing ci.yml handles TypeScript — this workflow is additive.
name: Multi-Language CI

on:
  push:
    branches: [main]
    paths:
      - "core-rs/**"
      - "core-rs-napi/**"
      - "cli-rs/**"
      - "gateway-go/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/multi-lang.yml"
  pull_request:
    paths:
      - "core-rs/**"
      - "core-rs-napi/**"
      - "cli-rs/**"
      - "gateway-go/**"
      - "proto/**"
      - "src/plugin-host/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/multi-lang.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (core-rs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-rs
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Upload static library
        uses: actions/upload-artifact@v4
        with:
          name: libdeneb-core
          path: core-rs/target/release/libdeneb_core.a
          retention-days: 1

  go-pure:
    name: Go (pure, no FFI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: gateway-go/go.sum

      - name: Build (no FFI)
        run: CGO_ENABLED=0 go build -tags no_ffi ./...

      - name: Test (no FFI)
        run: CGO_ENABLED=0 go test -tags no_ffi -count=1 ./...

      - name: Vet
        run: go vet -tags no_ffi ./...

  go-ffi:
    name: Go (with Rust FFI)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: gateway-go/go.sum

      - uses: actions/download-artifact@v8
        with:
          name: libdeneb-core
          path: core-rs/target/release/

      - name: Build (CGo + Rust FFI)
        working-directory: gateway-go
        run: go build ./...

      - name: Test (CGo + Rust FFI, race detector)
        working-directory: gateway-go
        run: go test -race -count=1 ./...

      - name: Test (integration)
        working-directory: gateway-go
        run: go test -race -count=1 -tags=integration ./...

      - name: Build gateway binary
        working-directory: gateway-go
        run: go build -o gateway ./cmd/gateway/

      - name: Gateway binary smoke test
        working-directory: gateway-go
        run: |
          # Start gateway on a random port
          ./gateway --port 0 &
          GW_PID=$!
          sleep 1
          # Verify process is running
          kill -0 $GW_PID 2>/dev/null || { echo "Gateway failed to start"; exit 1; }
          # Clean shutdown
          kill $GW_PID
          wait $GW_PID 2>/dev/null || true
          echo "Gateway smoke test passed"

      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: deneb-gateway
          path: gateway-go/gateway
          retention-days: 1

  cli-rs:
    name: Rust CLI (cli-rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli-rs

      - name: Check formatting
        working-directory: cli-rs
        run: cargo fmt -- --check

      - name: Clippy lint
        working-directory: cli-rs
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        working-directory: cli-rs
        run: cargo build --release

      - name: Test
        working-directory: cli-rs
        run: cargo test

  napi:
    name: Rust napi bridge (core-rs-napi)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Check
        run: cargo check -p deneb-core-rs-napi

  integration:
    name: Integration (Go + Plugin Host)
    runs-on: ubuntu-latest
    needs: go-ffi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: gateway-go/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v8
        with:
          name: deneb-gateway
          path: dist/

      - name: Make gateway binary executable
        run: chmod +x dist/gateway

      - name: Gateway with new flags smoke test
        run: |
          # Test that new flags are accepted
          dist/gateway --help 2>&1 | grep -q "plugin-host-cmd" || { echo "Missing --plugin-host-cmd flag"; exit 1; }
          dist/gateway --help 2>&1 | grep -q "config-dir" || { echo "Missing --config-dir flag"; exit 1; }
          dist/gateway --help 2>&1 | grep -q "auth-mode" || { echo "Missing --auth-mode flag"; exit 1; }
          echo "New flags present in gateway binary"

      - name: Gateway health endpoint test
        run: |
          dist/gateway --port 19999 --bind loopback &
          GW_PID=$!
          sleep 2
          # Check health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:19999/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed with status $HTTP_STATUS"
            kill $GW_PID 2>/dev/null || true
            exit 1
          fi
          echo "Health endpoint returned 200"
          # RPC test
          RESULT=$(curl -s -X POST http://127.0.0.1:19999/api/v1/rpc \
            -H "Content-Type: application/json" \
            -d '{"type":"req","id":"test-1","method":"health.check","params":{}}')
          echo "RPC response: $RESULT"
          echo "$RESULT" | grep -q '"ok":true' || { echo "RPC health.check failed"; kill $GW_PID; exit 1; }
          # Clean shutdown
          kill $GW_PID
          wait $GW_PID 2>/dev/null || true
          echo "Integration smoke test passed"
