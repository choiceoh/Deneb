# Verify all code-generation outputs are in sync with their sources.
#
# Each job covers one generation domain and only runs when that domain's
# source files are touched, so a small PR pays only for what it changed.
# When a job fails, the job name tells you exactly which group is broken.
name: Generate Check

on:
  pull_request:
    paths:
      - "proto/**"
      - "core-rs/core/src/ffi_utils.rs"
      - "core-rs/core/build.rs"
      - "core-rs/core/Cargo.toml"
      - "core-rs/Cargo.toml"
      - "gateway-go/internal/chat/tool_schemas.yaml"
      - "gateway-go/cmd/tool-schema-gen/**"
      - "gateway-go/internal/autoreply/thinking/model_caps.yaml"
      - "gateway-go/cmd/model-caps-gen/**"
      - "scripts/proto-gen.sh"
      - "scripts/gen-ffi-errors.sh"
      - "scripts/gen-proto-error-codes.sh"
      - "scripts/error-code-sync-check.sh"
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "core-rs/core/src/ffi_utils.rs"
      - "core-rs/core/build.rs"
      - "core-rs/core/Cargo.toml"
      - "core-rs/Cargo.toml"
      - "gateway-go/internal/chat/tool_schemas.yaml"
      - "gateway-go/cmd/tool-schema-gen/**"
      - "gateway-go/internal/autoreply/thinking/model_caps.yaml"
      - "gateway-go/cmd/model-caps-gen/**"
      - "scripts/proto-gen.sh"
      - "scripts/gen-ffi-errors.sh"
      - "scripts/gen-proto-error-codes.sh"
      - "scripts/error-code-sync-check.sh"

concurrency:
  group: generate-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROTOC_GEN_GO_VERSION: v1.36.11

# ── Change detection ───────────────────────────────────────────────────────

jobs:
  changes:
    name: detect changed domains
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      ffi-gen: ${{ steps.filter.outputs.ffi-gen }}
      tool-schemas: ${{ steps.filter.outputs.tool-schemas }}
      model-caps: ${{ steps.filter.outputs.model-caps }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proto:
              - "proto/**"
              - "core-rs/core/build.rs"
              - "core-rs/core/Cargo.toml"
              - "core-rs/Cargo.toml"
              - "scripts/proto-gen.sh"
              - "scripts/gen-proto-error-codes.sh"
              - "scripts/error-code-sync-check.sh"
            ffi-gen:
              - "core-rs/core/src/ffi_utils.rs"
              - "scripts/gen-ffi-errors.sh"
            tool-schemas:
              - "gateway-go/internal/chat/tool_schemas.yaml"
              - "gateway-go/cmd/tool-schema-gen/**"
            model-caps:
              - "gateway-go/internal/autoreply/thinking/model_caps.yaml"
              - "gateway-go/cmd/model-caps-gen/**"

# ── Domain check jobs ──────────────────────────────────────────────────────

  # proto → Go types + proto → Rust types + gateway.proto → error_codes.rs
  proto:
    name: proto types + error codes
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs

      - name: Install protoc + Go plugin
        run: |
          sudo apt-get install -y protobuf-compiler &
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }} &
          wait

      - name: proto generate check (proto → Go + Rust)
        run: make proto-check

      - name: error code 3-way sync check (gateway.proto → error_codes.rs)
        run: ./scripts/error-code-sync-check.sh

  # ffi_utils.rs → ffi_error_codes_gen.go
  ffi-gen:
    name: ffi error codes
    needs: changes
    if: needs.changes.outputs.ffi-gen == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ffi error codes check (ffi_utils.rs → ffi_error_codes_gen.go)
        run: make ffi-gen-check

  # tool_schemas.yaml → tool_schemas_gen.go
  tool-schemas:
    name: tool schemas
    needs: changes
    if: needs.changes.outputs.tool-schemas == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: Install pyyaml
        run: pip install pyyaml

      - name: tool schemas check (tool_schemas.yaml → tool_schemas_gen.go)
        run: make tool-schemas-check

  # model_caps.yaml → model_caps_gen.go
  model-caps:
    name: model capabilities
    needs: changes
    if: needs.changes.outputs.model-caps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: Install pyyaml
        run: pip install pyyaml

      - name: model caps check (model_caps.yaml → model_caps_gen.go)
        run: make model-caps-check
