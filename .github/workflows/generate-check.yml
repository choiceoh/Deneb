# Verify all code-generation outputs are in sync with their sources.
#
# Each job covers one generation domain and only runs when that domain's
# source files are touched, so a small PR pays only for what it changed.
# When a job fails, the job name tells you exactly which group is broken.
name: Generate Check

on:
  pull_request:
    paths:
      - "gateway-go/internal/pipeline/chat/toolreg/tool_schemas.json"
      - "gateway-go/cmd/tool-schema-gen/**"
      - "gateway-go/internal/pipeline/chat/tool_classification.json"
      - "gateway-go/cmd/data-gen/**"
      - "gateway-go/internal/runtime/rpc/handler/handlerminiapp/**"
      - "gateway-go/cmd/kotlin-models-gen/**"
      - "client-android/app/composeApp/src/commonMain/kotlin/ai/deneb/deneb/generated/MiniappWireTypes.kt"
  push:
    branches: [main]
    paths:
      - "gateway-go/internal/pipeline/chat/toolreg/tool_schemas.json"
      - "gateway-go/cmd/tool-schema-gen/**"
      - "gateway-go/internal/pipeline/chat/tool_classification.json"
      - "gateway-go/cmd/data-gen/**"
      - "gateway-go/internal/runtime/rpc/handler/handlerminiapp/**"
      - "gateway-go/cmd/kotlin-models-gen/**"
      - "client-android/app/composeApp/src/commonMain/kotlin/ai/deneb/deneb/generated/MiniappWireTypes.kt"

concurrency:
  group: generate-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ── Change detection ───────────────────────────────────────────────────────

jobs:
  changes:
    name: detect changed domains
    runs-on: ubuntu-24.04-arm
    outputs:
      tool-schemas: ${{ steps.filter.outputs.tool-schemas }}
      data-gen: ${{ steps.filter.outputs.data-gen }}
      kotlin-models: ${{ steps.filter.outputs.kotlin-models }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tool-schemas:
              - "gateway-go/internal/pipeline/chat/toolreg/tool_schemas.json"
              - "gateway-go/cmd/tool-schema-gen/**"
            data-gen:
              - "gateway-go/internal/pipeline/chat/tool_classification.json"
              - "gateway-go/cmd/data-gen/**"
            kotlin-models:
              - "gateway-go/internal/runtime/rpc/handler/handlerminiapp/**"
              - "gateway-go/cmd/kotlin-models-gen/**"
              - "client-android/app/composeApp/src/commonMain/kotlin/ai/deneb/deneb/generated/MiniappWireTypes.kt"

# ── Domain check jobs ──────────────────────────────────────────────────────

  # tool_schemas.json -> tool_schemas_gen.go
  tool-schemas:
    name: tool schemas
    needs: changes
    if: needs.changes.outputs.tool-schemas == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: tool schemas check (tool_schemas.json -> tool_schemas_gen.go)
        run: make tool-schemas-check

  # tool_classification.json -> tool_classification_gen.go
  data-gen:
    name: data tables
    needs: changes
    if: needs.changes.outputs.data-gen == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: data tables check (tool_classification.json -> tool_classification_gen.go)
        run: make data-gen-check

  # handlerminiapp //deneb:wire structs -> MiniappWireTypes.kt
  # This domain was missing until PR #2241 moved a wired struct without its
  # directive and the drift landed on main unnoticed (fixed in PR #2244).
  kotlin-models:
    name: kotlin wire models
    needs: changes
    if: needs.changes.outputs.kotlin-models == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: kotlin wire models check (//deneb:wire -> MiniappWireTypes.kt)
        run: make kotlin-models-check
