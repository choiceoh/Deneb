# Verify all code-generation outputs are in sync with their sources.
#
# Each job covers one generation domain and only runs when that domain's
# source files are touched, so a small PR pays only for what it changed.
# When a job fails, the job name tells you exactly which group is broken.
name: Generate Check

on:
  pull_request:
    paths:
      - "proto/**"
      - "gateway-go/internal/chat/toolreg/tool_schemas.yaml"
      - "gateway-go/cmd/tool-schema-gen/**"
      - "gateway-go/internal/autoreply/thinking/model_caps.yaml"
      - "gateway-go/cmd/model-caps-gen/**"
      - "scripts/proto-gen.sh"
      - "scripts/gen-error-codes.sh"
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "gateway-go/internal/chat/toolreg/tool_schemas.yaml"
      - "gateway-go/cmd/tool-schema-gen/**"
      - "gateway-go/internal/autoreply/thinking/model_caps.yaml"
      - "gateway-go/cmd/model-caps-gen/**"
      - "scripts/proto-gen.sh"
      - "scripts/gen-error-codes.sh"

concurrency:
  group: generate-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROTOC_GEN_GO_VERSION: v1.36.11

# ── Change detection ───────────────────────────────────────────────────────

jobs:
  changes:
    name: detect changed domains
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      tool-schemas: ${{ steps.filter.outputs.tool-schemas }}
      model-caps: ${{ steps.filter.outputs.model-caps }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proto:
              - "proto/**"
              - "scripts/proto-gen.sh"
              - "scripts/gen-error-codes.sh"
            tool-schemas:
              - "gateway-go/internal/chat/toolreg/tool_schemas.yaml"
              - "gateway-go/cmd/tool-schema-gen/**"
            model-caps:
              - "gateway-go/internal/autoreply/thinking/model_caps.yaml"
              - "gateway-go/cmd/model-caps-gen/**"

# ── Domain check jobs ──────────────────────────────────────────────────────

  # proto -> Go types + error codes (ErrorCode + FfiErrorCode)
  proto:
    name: proto types + error codes
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: Install protoc + Go plugin
        run: |
          sudo apt-get install -y protobuf-compiler &
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }} &
          wait

      - name: proto generate check (proto -> Go)
        run: make proto-check

      - name: error codes check (gateway.proto -> Go)
        run: make error-codes-gen-check

  # tool_schemas.yaml -> tool_schemas_gen.go
  tool-schemas:
    name: tool schemas
    needs: changes
    if: needs.changes.outputs.tool-schemas == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: Install pyyaml
        run: pip install pyyaml

      - name: tool schemas check (tool_schemas.yaml -> tool_schemas_gen.go)
        run: make tool-schemas-check

  # model_caps.yaml -> model_caps_gen.go
  model-caps:
    name: model capabilities
    needs: changes
    if: needs.changes.outputs.model-caps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: gateway-go/go.sum

      - name: Install pyyaml
        run: pip install pyyaml

      - name: model caps check (model_caps.yaml -> model_caps_gen.go)
        run: make model-caps-check
