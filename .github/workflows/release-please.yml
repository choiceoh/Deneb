name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_version:
        description: "Target version (e.g. 3.12.0). Leave empty for auto."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-24.04-arm
    outputs:
      # 멀티패키지(manifest)에선 출력이 패키지 경로로 prefix됨(`.--*`, `andromeda--*`).
      # 게이트웨이(`.`)는 prefix 우선 + 단일 시절 bare 출력 폴백 — release-please는 패키지별
      # release_created를 'true'/'false'로 명시 출력하므로 andromeda-only 릴리즈엔 오발화 안 함.
      release-created: ${{ steps.release.outputs['.--release_created'] || steps.release.outputs.release_created }}
      tag: ${{ steps.release.outputs['.--tag_name'] || steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs['.--version'] || steps.release.outputs.version }}
      andromeda-release-created: ${{ steps.release.outputs['andromeda--release_created'] }}
      andromeda-tag: ${{ steps.release.outputs['andromeda--tag_name'] }}
      andromeda-release-id: ${{ steps.release.outputs['andromeda--id'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
      # 첫 릴리즈에서 실제 출력키를 로그로 확인(멀티패키지 prefix 검증). env 경유 = injection 안전.
      - name: Debug release-please outputs
        if: always()
        env:
          OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        run: echo "$OUTPUTS"

  post-release:
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          # Build the gateway from the released tag (same reason as andromeda-build):
          # release creation can land in a neighboring run, and building github.sha
          # would compile a stale tree under the new version label. fetch-depth: 0
          # preserves full history for the version/changelog tooling.
          ref: ${{ needs.release-please.outputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: gateway-go/go.sum
      - name: Detect pre-release
        id: prerelease
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if echo "$VERSION" | grep -qE '(alpha|beta|rc|pre)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build gateway binary (linux-arm64)
        run: |
          cd gateway-go
          CGO_ENABLED=0 go build \
            -ldflags "-s -w -X main.version=${{ needs.release-please.outputs.version }}" \
            -o ../deneb-linux-arm64 ./cmd/gateway/
      - name: Generate SHA256 checksum
        run: sha256sum deneb-linux-arm64 > deneb-linux-arm64.sha256
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag }}
          files: |
            deneb-linux-arm64
            deneb-linux-arm64.sha256
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-summary:
    needs: [release-please, post-release]
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Collect commit stats
        id: stats
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMIT_RANGE="HEAD~100..HEAD"
          else
            COMMIT_RANGE="${PREV_TAG}..HEAD"
          fi
          TOTAL=$(git log --oneline $COMMIT_RANGE | wc -l)
          ADDED=$(git diff --shortstat $PREV_TAG..HEAD 2>/dev/null | grep -oP '\d+(?= insertion)' || echo 0)
          DELETED=$(git diff --shortstat $PREV_TAG..HEAD 2>/dev/null | grep -oP '\d+(?= deletion)' || echo 0)
          FILES=$(git diff --stat $PREV_TAG..HEAD 2>/dev/null | tail -1 | grep -oP '\d+(?= file)' || echo 0)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Generate release summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🚀 Deneb ${{ needs.release-please.outputs.tag }}

          | Metric | Value |
          |--------|-------|
          | Commits | ${{ steps.stats.outputs.total }} |
          | Files changed | ${{ steps.stats.outputs.files }} |
          | Lines added | ${{ steps.stats.outputs.added }} |
          | Lines deleted | ${{ steps.stats.outputs.deleted }} |

          ### Binary
          | Platform | File |
          |----------|------|
          | linux/arm64 | \`deneb-linux-arm64\` |

          ### Deploy on DGX Spark
          \`\`\`bash
          curl -sL -o deneb https://github.com/choiceoh/Deneb/releases/download/${{ needs.release-please.outputs.tag }}/deneb-linux-arm64
          chmod +x deneb && sudo mv deneb /usr/local/bin/
          deneb gateway restart
          \`\`\`
          EOF

  andromeda-build:
    # andromeda 컴포넌트 릴리즈가 생성될 때만 — 데스크탑 번들을 빌드·서명해 그 릴리즈에 업로드.
    # ⚠️ 시크릿 TAURI_SIGNING_PRIVATE_KEY[_PASSWORD] 필요 (andromeda와 동일 minisign 키).
    needs: release-please
    if: needs.release-please.outputs.andromeda-release-created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: andromeda
    steps:
      - uses: actions/checkout@v7
        with:
          # Build from the released tag, not github.sha (the commit that triggered
          # this run). release-please can create the release in a NEIGHBORING push's
          # run (interleaved merges / its one-push lag), so github.sha may still be
          # the pre-bump tree — that bakes the old version into the bundle (e.g.
          # 0.0.29 files were uploaded to the andromeda-v0.0.30 release). The tag
          # always carries the bumped version, keeping bundle version == release.
          ref: ${{ needs.release-please.outputs.andromeda-tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: andromeda/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: andromeda/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: andromeda/src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: andromeda
          releaseId: ${{ needs.release-please.outputs.andromeda-release-id }}
          args: ${{ matrix.args }}
