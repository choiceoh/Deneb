name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_version:
        description: "Target version (e.g. 3.12.0). Leave empty for auto."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  post-release:
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Build Rust core (release)
        working-directory: core-rs
        run: cargo build --release
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: gateway-go/go.sum
      - name: Detect pre-release
        id: prerelease
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if echo "$VERSION" | grep -qE '(alpha|beta|rc|pre)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build gateway binary (${{ matrix.suffix }})
        run: |
          cd gateway-go
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 \
            go build \
            -ldflags "-s -w -X main.version=${{ needs.release-please.outputs.version }}" \
            -o ../deneb-${{ matrix.suffix }} ./cmd/gateway/
      - name: Generate SHA256 checksum
        run: sha256sum deneb-${{ matrix.suffix }} > deneb-${{ matrix.suffix }}.sha256
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag }}
          files: |
            deneb-${{ matrix.suffix }}
            deneb-${{ matrix.suffix }}.sha256
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-summary:
    needs: [release-please, post-release]
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect commit stats
        id: stats
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMIT_RANGE="HEAD~100..HEAD"
          else
            COMMIT_RANGE="${PREV_TAG}..HEAD"
          fi
          TOTAL=$(git log --oneline $COMMIT_RANGE | wc -l)
          ADDED=$(git diff --shortstat $PREV_TAG..HEAD 2>/dev/null | grep -oP '\d+(?= insertion)' || echo 0)
          DELETED=$(git diff --shortstat $PREV_TAG..HEAD 2>/dev/null | grep -oP '\d+(?= deletion)' || echo 0)
          FILES=$(git diff --stat $PREV_TAG..HEAD 2>/dev/null | tail -1 | grep -oP '\d+(?= file)' || echo 0)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Generate release summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🚀 Deneb ${{ needs.release-please.outputs.tag }}

          | Metric | Value |
          |--------|-------|
          | Commits | ${{ steps.stats.outputs.total }} |
          | Files changed | ${{ steps.stats.outputs.files }} |
          | Lines added | ${{ steps.stats.outputs.added }} |
          | Lines deleted | ${{ steps.stats.outputs.deleted }} |

          ### Binary
          | Platform | File |
          |----------|------|
          | linux/arm64 | \`deneb-linux-arm64\` |

          ### Deploy on DGX Spark
          \`\`\`bash
          curl -sL -o deneb https://github.com/choiceoh/Deneb/releases/download/${{ needs.release-please.outputs.tag }}/deneb-linux-arm64
          chmod +x deneb && sudo mv deneb /usr/local/bin/
          deneb gateway restart
          \`\`\`
          EOF
