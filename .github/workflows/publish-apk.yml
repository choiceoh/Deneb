name: Publish APK (OTA)

# Build the foss release APK on the gx10 self-hosted runner and publish it to the
# gateway's local serve dir (~/.cache/deneb-apk) via scripts/dev/publish-apk.sh,
# which assigns the versionCode under flock. This is a thin trigger over the same
# script the operator runs by hand. The pre-publish native-app smoke gate is skipped
# here (DENEB_SKIP_SMOKE, see the job env for why) — it is unreliable unattended.
#
# Auto-runs when a native change lands on main (paths: client-android/**). With the
# versionCode-only scheme there is no semantic version to gate on -- every shipped
# native change becomes the next build (publish-apk.sh auto-increments the code under
# flock), so merging a native PR is itself the release signal. Also runnable on demand
# (workflow_dispatch) with custom release notes.
#
# Prerequisite: a self-hosted runner on gx10 labeled "gx10", running as the gateway
# user so HOME/.cache/deneb-apk is the directory the gateway serves, with the Android
# SDK installed. One-time setup is documented in .claude/rules/release-and-deploy.md.
# Only push-to-main and manual dispatch trigger this -- never fork pull requests --
# so untrusted code can never run on the host runner.

on:
  push:
    branches: [main]
    paths:
      - client-android/**
  workflow_dispatch:
    inputs:
      notes:
        description: Release notes shown in the in-app updater (defaults to the head commit subject)
        required: false
        default: ""

permissions:
  contents: read

# One publish at a time; never cancel an in-flight build (it is writing the serve dir).
concurrency:
  group: publish-apk
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, gx10]
    timeout-minutes: 30
    env:
      DENEB_INSTANCE: ci-publish-apk
      # Skip the pre-publish native-app smoke gate in unattended CI. That gate drives
      # the live app by pixel taps over real prod data and leaks state between steps,
      # so it flakes here (observed: the mail-detail step landed on the session drawer
      # and aborted a perfectly good build). Render-crash protection stays a pre-merge
      # responsibility (run native-app-smoke.sh / renderPreviews on native PRs) plus
      # compile + unit tests; an operator who wants the gate runs publish-apk.sh by hand.
      DENEB_SKIP_SMOKE: "1"
      # Base URL baked into version.json's download link. Set this repo variable to
      # the gateway's reachable base (tailnet/cloudflare); unset falls back to the
      # script default, which is fine because the updater downloads via the gateway.
      DENEB_APK_BASE_URL: ${{ vars.DENEB_APK_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release notes
        id: notes
        env:
          INPUT_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          notes="$INPUT_NOTES"
          if [ -z "$notes" ]; then
            notes="$(git log -1 --pretty=%s)"
          fi
          {
            echo "notes<<__NOTES_EOF__"
            echo "$notes"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build, smoke, and publish APK
        env:
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          set -euo pipefail
          scripts/dev/publish-apk.sh "$NOTES"

      # The gateway runs on srv4 but the build runs here (the gx10/srv1 runner, which
      # has the Android SDK). publish-apk.sh wrote the APK + version.json to THIS
      # runner's serve dir; copy the just-published build to srv4's serve dir so the
      # gateway's OTA manifest (highest-versionCode scan of ~/.cache/deneb-apk) sees it.
      # Only the newest APK matters (manifest takes the top code), so we ship that one
      # + version.json, not the whole 300+ build history.
      - name: Sync published APK to srv4 gateway serve dir
        run: |
          set -euo pipefail
          d="${DENEB_APK_DIR:-$HOME/.cache/deneb-apk}"
          latest="$(ls -t "$d"/*.apk | head -1)"
          ssh -o StrictHostKeyChecking=accept-new srv4 'mkdir -p ~/.cache/deneb-apk'
          rsync -a "$latest" "$d/version.json" srv4:.cache/deneb-apk/
          echo "synced $(basename "$latest") + version.json -> srv4 gateway serve dir"
