name: cargo-deny

on:
  push:
    branches: [main]
    paths:
      - "core-rs/**"
      - "cli-rs/**"
      - "deny.toml"
  pull_request:
    paths:
      - "core-rs/**"
      - "cli-rs/**"
      - "deny.toml"

concurrency:
  group: cargo-deny-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 10
    strategy:
      matrix:
        workspace: [core-rs, cli-rs]
    steps:
      - uses: actions/checkout@v6

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ${{ matrix.workspace }}/Cargo.toml
          command: check
          arguments: --workspace
