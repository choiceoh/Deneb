# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 2
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # Go modules — gateway-go (used by Go gateway)
  - package-ecosystem: gomod
    directory: /gateway-go
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      go-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # Rust crates — core-rs (FFI engine, built with --no-default-features)
  - package-ecosystem: cargo
    directory: /core-rs
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    ignore:
      # napi is Node.js-only feature, excluded in Go builds
      - dependency-name: "napi"
        versions: ["*"]
      - dependency-name: "napi-derive"
        versions: ["*"]
      - dependency-name: "napi-build"
        versions: ["*"]
    groups:
      rust-core:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # Rust crates — cli-rs (standalone CLI tool)
  - package-ecosystem: cargo
    directory: /cli-rs
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      rust-cli:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 3
