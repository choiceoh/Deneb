# GitHub auto-generated release notes configuration
# Controls the "Generate release notes" button and complements release-please.

changelog:
  exclude:
    labels:
      - "skip-changelog"
      - "dependencies"
    authors:
      - "dependabot"
      - "renovate"
  categories:
    - title: "✨ Features"
      labels:
        - "enhancement"
        - "feature"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "⚡ Performance"
      labels:
        - "performance"
    - title: "🔧 Internal"
      labels:
        - "lang: rust"
        - "lang: go"
        - "lang: protobuf"
        - "ci"
        - "refactor"
    - title: "📝 Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "🧪 Tests"
      labels:
        - "test"
        - "testing"
    - title: "📦 Dependencies"
      labels:
        - "dependencies"
    - title: "Other"
      labels:
        - "*"
