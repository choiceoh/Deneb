# Language labels
"lang: rust":
  - changed-files:
      - any-glob-to-any-file:
          - "core-rs/**"
          - "cli-rs/**"

"lang: go":
  - changed-files:
      - any-glob-to-any-file:
          - "gateway-go/**"

"lang: protobuf":
  - changed-files:
      - any-glob-to-any-file:
          - "proto/**"
          - "scripts/proto-gen.sh"

# Domain labels
"ai":
  - changed-files:
      - any-glob-to-any-file:
          - "gateway-go/internal/chat/**"
          - "gateway-go/internal/llm/**"
          - "gateway-go/internal/tools/**"
          - "gateway-go/internal/autonomous/**"
          - "gateway-go/internal/agent/**"

"channel: telegram":
  - changed-files:
      - any-glob-to-any-file:
          - "gateway-go/internal/telegram/**"
          - "extensions/telegram/**"
          - "docs/channels/telegram.md"

"gateway":
  - changed-files:
      - any-glob-to-any-file:
          - "gateway-go/**"
          - "docs/gateway/**"

"ffi":
  - changed-files:
      - any-glob-to-any-file:
          - "core-rs/**"
          - "gateway-go/internal/ffi/**"

"docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"

"cli":
  - changed-files:
      - any-glob-to-any-file:
          - "cli-rs/**"

"scripts":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**"

"docker":
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
