# cargo-deny configuration for the Deneb Rust workspace (core-rs/).
# Run: cargo deny --workspace check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

# --- Advisories (security vulnerability database) ---
[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []
# Require at least 0.8 confidence for advisory matches.
confidence-threshold = 0.8

# --- Licenses ---
[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
]
# Dual-licensed crates (MIT OR Apache-2.0) are common in Rust; both are allowed above.
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
# Some crates have non-standard license files; add exceptions here as needed.
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# --- Bans (duplicate crate versions, wildcards) ---
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# --- Sources (registry and git restrictions) ---
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
