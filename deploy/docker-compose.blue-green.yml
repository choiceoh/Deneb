# Blue-Green 배포용 Docker Compose
#
# 두 슬롯(blue/green)에 각각 게이트웨이를 띄우고,
# nginx 프록시가 활성 슬롯으로 트래픽을 라우팅합니다.
#
# 사용법: blue-green.sh 스크립트가 자동으로 관리합니다.
#   직접 사용 시: ACTIVE_SLOT=blue docker compose -f deploy/docker-compose.blue-green.yml up -d

x-gateway-base: &gateway-base
  image: ${DENEB_IMAGE:-deneb:local}
  environment:
    HOME: /home/node
    TERM: xterm-256color
    DENEB_GATEWAY_TOKEN: ${DENEB_GATEWAY_TOKEN:-}
    DENEB_ALLOW_INSECURE_PRIVATE_WS: ${DENEB_ALLOW_INSECURE_PRIVATE_WS:-}
    TZ: ${DENEB_TZ:-UTC}
    NODE_ENV: production
    NODE_OPTIONS: "--max-old-space-size=2048"
  init: true
  restart: unless-stopped
  networks:
    - bg-network

services:
  # ── Blue 슬롯 ──
  gateway-blue:
    <<: *gateway-base
    container_name: deneb-gateway-blue
    volumes:
      - ${DENEB_CONFIG_DIR:-./.deneb}/blue:/home/node/.deneb
    ports:
      - "${BLUE_PORT:-18791}:18789"
    command:
      [
        "node", "dist/index.js", "gateway",
        "--bind", "lan",
        "--port", "18789",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD", "node", "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Green 슬롯 ──
  gateway-green:
    <<: *gateway-base
    container_name: deneb-gateway-green
    volumes:
      - ${DENEB_CONFIG_DIR:-./.deneb}/green:/home/node/.deneb
    ports:
      - "${GREEN_PORT:-18792}:18789"
    command:
      [
        "node", "dist/index.js", "gateway",
        "--bind", "lan",
        "--port", "18789",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD", "node", "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Nginx 리버스 프록시 ──
  proxy:
    image: nginx:alpine
    container_name: deneb-bg-proxy
    ports:
      - "${DENEB_GATEWAY_PORT:-18789}:80"
      - "${DENEB_BRIDGE_PORT:-18790}:18790"
    volumes:
      - ./deploy/nginx-bg.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-blue
      - gateway-green
    restart: unless-stopped
    networks:
      - bg-network

networks:
  bg-network:
    driver: bridge
