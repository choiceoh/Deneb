services:
  - type: web
    name: deneb
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: DENEB_STATE_DIR
        value: /data/.deneb
      - key: DENEB_WORKSPACE_DIR
        value: /data/workspace
      - key: DENEB_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: deneb-data
      mountPath: /data
      sizeGB: 1
